<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Seis Destinos</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a2a52">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body class="pagina-dashboard">

  <header class="header">
    <img src="logo.png" alt="Seis Destinos" style="max-width: 120px; height: auto; display: block;">
    <div class="header__usuario">
      <div class="header__info">
        <span class="header__info-nombre" id="header-nombre"></span>
        <span class="header__info-subtitulo" id="header-email"></span>
      </div>
      <div class="header__avatar" id="header-avatar"></div>
      <button class="btn btn--secundario" id="btn-logout" style="font-size: 0.875rem; padding: 0.5rem 0.875rem;">
        Salir
      </button>
    </div>
  </header>

  <main class="dashboard__contenido">
    <div class="dashboard__titulo" id="dashboard-titulo">
      <h1>Módulos</h1>
    </div>

    <div class="grilla-modulos" id="grilla-modulos">
      <!-- Los módulos se renderizan desde JS -->
    </div>

    <div id="dashboard-pendiente" class="estado-vacio" hidden>
      <div class="estado-vacio__icono" id="dashboard-pendiente-icono">⏳</div>
      <div class="estado-vacio__titulo" id="dashboard-pendiente-titulo">Tu cuenta está pendiente de aprobación</div>
      <p class="estado-vacio__descripcion" id="dashboard-pendiente-descripcion">Un administrador todavía no aprobó tu acceso. Te avisamos cuando esté listo.</p>
    </div>
  </main>

  <script type="module">
    import { verificarSesion, cerrarSesion } from './js/auth.js'
    import { mostrarBannerVersion } from './js/version-banner.js'
    import { supabase } from './js/supabase.js'

    mostrarBannerVersion()

    // Orden fijo — no depende de datos, siempre se muestran en este orden.
    const MODULOS = [
      {
        clave: 'gastos',
        nombre: 'Gastos',
        icono: 'credit-card',
        descripcion: 'Registro y control de gastos',
        url: 'modulos/gastos.html',
        proximamente: false,
        color: 'cyan'
      },
      {
        clave: 'caja',
        nombre: 'Caja',
        icono: 'wallet',
        descripcion: 'Saldo y movimientos de caja por persona',
        url: 'modulos/caja.html',
        proximamente: false,
        color: 'amarillo'
      },
      {
        clave: 'accesos',
        nombre: 'Accesos',
        icono: 'user-check',
        descripcion: 'Aprobación de usuarios y permisos',
        url: 'modulos/accesos.html',
        proximamente: false,
        soloAdmin: true,
        color: 'rojo'
      },
      {
        clave: 'empleados',
        nombre: 'Empleados',
        icono: 'users',
        descripcion: 'Directorio sincronizado desde Naaloo',
        url: 'modulos/empleados.html',
        proximamente: false,
        color: 'violeta'
      }
    ]

    const COLORES_MODULO = {
      cyan:      { bg: 'var(--color-acento-suave)', fg: 'var(--color-acento-highlight)' },
      rojo:      { bg: 'var(--rojo-suave)',          fg: 'var(--rojo)' },
      violeta:   { bg: 'var(--violeta-suave)',       fg: 'var(--violeta)' },
      amarillo:  { bg: 'var(--amarillo-suave)',      fg: 'var(--amarillo)' }
    }

    // Verificar sesión — redirige a login si no hay una activa
    const sesion = await verificarSesion()
    if (!sesion) throw new Error('Sin sesión')

    // Resolver nombre e inicial del usuario
    const meta      = sesion.user.user_metadata ?? {}
    const nombre    = meta.nombre_completo || meta.full_name || meta.nombre || ''
    const email     = sesion.user.email ?? ''
    const inicial   = (nombre ? nombre : email).charAt(0).toUpperCase()

    document.getElementById('header-avatar').textContent  = inicial
    document.getElementById('header-nombre').textContent  = nombre || email
    document.getElementById('header-email').textContent   = nombre ? email : ''

    document.getElementById('btn-logout').addEventListener('click', () => cerrarSesion())

    // Chequeamos si esta cuenta de Auth ya tiene una fila vinculada en empleados.
    // Si no la tiene (cuenta creada pero solicitud todavía no aprobada), no mostramos
    // ningún módulo — ni siquiera los que no son admin-only.
    const { data: miEmpleado } = await supabase
      .from('empleados')
      .select('rol_app')
      .eq('auth_user_id', sesion.user.id)
      .maybeSingle()

    if (!miEmpleado) {
      // Todavía no hay fila en empleados — puede ser: solicitud pendiente,
      // solicitud rechazada (la cuenta debería haberse borrado al rechazar,
      // pero por las dudas la UI lo contempla), o caso huérfano (cuenta de
      // Auth sin ninguna solicitud asociada — no debería pasar más después
      // del fix de crear-solicitud-acceso, pero tampoco debería colgar
      // a la persona en un mensaje que no explica nada).
      const { data: miSolicitud } = await supabase.rpc('obtener_mi_solicitud_acceso')
      const estadoSolicitud = miSolicitud?.[0]?.estado ?? null

      const MENSAJES_ESTADO = {
        pendiente: {
          icono: '⏳',
          titulo: 'Tu cuenta está pendiente de aprobación',
          descripcion: 'Un administrador todavía no aprobó tu acceso. Te avisamos cuando esté listo.',
        },
        rechazada: {
          icono: '🚫',
          titulo: 'Tu solicitud fue rechazada',
          descripcion: 'Contactá a un administrador si creés que fue un error.',
        },
        huerfano: {
          icono: '⚠️',
          titulo: 'Hubo un problema con tu registro',
          descripcion: 'Contactá a un administrador para que revise tu cuenta.',
        },
      }

      const mensaje = MENSAJES_ESTADO[estadoSolicitud] || MENSAJES_ESTADO.huerfano

      document.getElementById('dashboard-pendiente-icono').textContent = mensaje.icono
      document.getElementById('dashboard-pendiente-titulo').textContent = mensaje.titulo
      document.getElementById('dashboard-pendiente-descripcion').textContent = mensaje.descripcion

      document.getElementById('dashboard-titulo').hidden = true
      document.getElementById('grilla-modulos').hidden = true
      document.getElementById('dashboard-pendiente').hidden = false
      throw new Error('Cuenta sin empleado vinculado — estado: ' + (estadoSolicitud ?? 'sin solicitud'))
    }

    const esAdmin = ['admin', 'super_admin'].includes(miEmpleado.rol_app)

    // Solicitudes de acceso pendientes — solo admin/super_admin pueden verlas
    // (misma policy de solicitudes_acceso que usa accesos.html), se muestran
    // como badge sobre la tarjeta de Accesos.
    let pendientes = 0
    if (esAdmin) {
      const { count } = await supabase
        .from('solicitudes_acceso')
        .select('id', { count: 'exact', head: true })
        .eq('estado', 'pendiente')
      pendientes = count || 0
    }

    // Renderizar grilla de módulos
    const grilla = document.getElementById('grilla-modulos')

    const tarjetas = MODULOS.filter(modulo => !modulo.soloAdmin || esAdmin).map((modulo) => {
      const colores = COLORES_MODULO[modulo.color]
      const badge = (modulo.clave === 'accesos' && pendientes > 0)
        ? `<span class="tarjeta-modulo__badge">${pendientes}</span>`
        : ''

      if (modulo.proximamente) {
        return `
          <div class="tarjeta-modulo tarjeta-modulo--inactiva" title="${modulo.nombre} — próximamente">
            <span class="tarjeta-modulo__icono-contenedor" style="background:${colores.bg}; color:${colores.fg};">
              <i data-lucide="${modulo.icono}"></i>
            </span>
            <span class="tarjeta-modulo__texto">
              <span class="tarjeta-modulo__nombre">${modulo.nombre}</span>
              <span class="tarjeta-modulo__descripcion">${modulo.descripcion}</span>
            </span>
            <span class="tarjeta-modulo__proximamente">Próximamente</span>
          </div>
        `
      }
      return `
        <a href="${modulo.url}" class="tarjeta-modulo">
          <span class="tarjeta-modulo__icono-contenedor" style="background:${colores.bg}; color:${colores.fg};">
            <i data-lucide="${modulo.icono}"></i>
            ${badge}
          </span>
          <span class="tarjeta-modulo__texto">
            <span class="tarjeta-modulo__nombre">${modulo.nombre}</span>
            <span class="tarjeta-modulo__descripcion">${modulo.descripcion}</span>
          </span>
          <span class="tarjeta-modulo__abrir" style="color:${colores.fg};">Abrir →</span>
        </a>
      `
    }).join('')

    const placeholder = `
      <div class="tarjeta-modulo tarjeta-modulo--placeholder">
        <span class="tarjeta-modulo__icono-contenedor">
          <i data-lucide="plus"></i>
        </span>
        <span class="tarjeta-modulo__descripcion">Más módulos en camino</span>
      </div>
    `

    grilla.innerHTML = tarjetas + placeholder
    lucide.createIcons()
  </script>

</body>
</html>

  <script type="module">
    import { verificarSesion } from '../js/auth.js'
    import { mostrarError, mostrarExito, formatearFecha } from '../js/utils.js'
    import { supabase } from '../js/supabase.js'
    import { mostrarBannerVersion } from '../js/version-banner.js'

    mostrarBannerVersion()

    // ═══════════════════════════════════════════════════════════════════════
    // ESTADO GLOBAL
    // ═══════════════════════════════════════════════════════════════════════

    const estado = {
      sesion:          null,
      miEmpleado:      null, // { id, nombre, rol_app, caja_raiz }
      empleados:       [],   // personas con acceso (solo se carga para admin/super_admin)
      maestros:        { unidadesNegocio: [] },
      saldos:          [],   // filas de v_caja_saldos — para admin: de todos los visibles;
                              // para usuario: solo las propias (nunca se piden las de otros)
      cuentasPorId:    {},   // id -> {id, empleado_id, nombre, medio, moneda, favorita, activa,
                              // created_at} — se completa con TODAS las cuentas que se van
                              // cargando (propias, de terceros bajo demanda, en bloque para el
                              // listado). SIN filtrar por activa acá — el filtro se aplica en
                              // cada lugar que las consume, para que desactivar una cuenta no
                              // deje una entrada vieja con activa:true colgada en el mapa.
      saldosPorCuenta: [],   // filas de v_caja_saldos_cuenta { cuenta_id, saldo } del alcance
                              // actual (una persona puntual, o todas las visibles del listado)
      superAdmins:     [],   // { id, nombre, caja_raiz } — todos los rol_app='super_admin'
      nombresEmpleados: {},  // id -> nombre (todos los activos), para resolver contraparte/
                              // titular sin depender de embeds ambiguos (caja_movimientos
                              // tiene 3 FKs a empleados: empleado_id, contraparte_empleado_id,
                              // creado_por — un embed "empleados(nombre)" sería ambiguo)
      movimientosDelMes: 0,
      misSolicitudesPendientes: 0, // cantidad de caja_solicitudes_movimiento pendientes
                              // donde estado.miEmpleado.id es origen o destino — badge
                              // del listado general (solo admin/super_admin)
      personaAbierta:  null, // id de empleado cuya ficha está abierta
      origenFicha:     null, // 'listado' (la abrió un admin) | 'directo' (entró un usuario)
      movimientos:     [],
      solicitudesPendientes: [], // solicitudes pendientes DE LA FICHA abierta (donde su
                              // dueño es origen o destino) — el botón que se muestra por
                              // fila depende de quién está LOGUEADO, no de la ficha
      filtros:         { busqueda: '' },
      wizardMovimiento: { tipo: null, empleadoId: null },
    }

    // egreso_transferencia no tiene etiqueta fija — se arma dinámico con el
    // nombre de la contraparte ("Entregado a X"), ver etiquetaMovimiento().
    const TIPO_LABEL = { ingreso: 'Ingreso', ingreso_externo: 'Ingreso externo', egreso_gasto: 'Gasto', egreso_retiro: 'Retiro' }
    const MEDIO_PAGO_LABEL_CAJA = { efectivo: 'Efectivo', transferencia: 'Banco' }
    // cuentas_caja.medio usa valores propios ('efectivo'/'banco'), distintos
    // a los de medio_pago ('efectivo'/'transferencia') — no son intercambiables.
    const MEDIO_CUENTA_LABEL = { efectivo: 'Efectivo', banco: 'Banco' }

    function esAdmin() {
      return ['admin', 'super_admin'].includes(estado.miEmpleado?.rol_app)
    }

    // ═══════════════════════════════════════════════════════════════════════
    // HELPERS
    // ═══════════════════════════════════════════════════════════════════════

    function iniciales(nombre) {
      const palabras = (nombre || '').trim().split(/\s+/).filter(Boolean)
      if (!palabras.length) return '—'
      if (palabras.length === 1) return palabras[0].slice(0, 2).toUpperCase()
      return (palabras[0][0] + palabras[1][0]).toUpperCase()
    }

    const PALETA_AVATAR = ['#C99A2E', '#8C6A1A', '#D9B45C', '#4A5568', '#7A2E42']
    function colorAvatar(texto) {
      let hash = 0
      for (let i = 0; i < (texto || '').length; i++) hash = texto.charCodeAt(i) + ((hash << 5) - hash)
      return PALETA_AVATAR[Math.abs(hash) % PALETA_AVATAR.length]
    }

    function formatearImporte(importe, moneda = 'ARS') {
      if (importe == null) return '—'
      const num = Number(importe).toLocaleString('es-AR', {
        minimumFractionDigits: 2, maximumFractionDigits: 2,
      })
      return moneda === 'USD' ? `USD ${num}` : `$ ${num}`
    }

    // Envuelve el valor en el chip claro cuando es negativo — única excepción
    // de color permitida (bordó) para textos sobre fondo ámbar.
    function formatearImporteConAlerta(importe, moneda) {
      const texto = formatearImporte(importe, moneda)
      return Number(importe) < 0 ? `<span class="valor-negativo-chip">${texto}</span>` : texto
    }

    // Convierte "1.349.799,77" → 1349799.77
    function parseImporte(str) {
      if (!str) return null
      const limpio = String(str).replace(/\./g, '').replace(',', '.')
      const num    = parseFloat(limpio)
      return isNaN(num) ? null : num
    }

    function fechaISO(d) {
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0')
    }

    function saldosDe(empleadoId) {
      return estado.saldos.filter(s => s.empleado_id === empleadoId)
    }

    // Arma el desglose expandible por cuenta para UNA moneda puntual,
    // agrupado por medio. cuentaIds acota el universo de cuentas a
    // considerar (las de una persona puntual, o las de todas las visibles
    // para el total de la empresa). Devuelve '' si no hay ninguna fila.
    //   - Ficha de una persona (conDueno=false): colapsado muestra la cuenta
    //     FAVORITA de esa combinación (o la más vieja por created_at si por
    //     algún motivo no hay ninguna marcada — el modal "Nueva cuenta" ya
    //     lo previene, pero esto evita que el render se rompa si igual pasa).
    //     Desplegado: el resto de sus cuentas de esa combinación.
    //   - Total de la empresa (conDueno=true): colapsado muestra la SUMA
    //     total de esa combinación (mismo número que se veía antes).
    //     Desplegado: cada cuenta individual, con el nombre de su dueño
    //     adelante — acá "favorita" no aplica, es un concepto por persona.
    function renderizarDesglosePorCuenta(cuentaIds, moneda, { conDueno = false } = {}) {
      const idsSet = new Set(cuentaIds)
      const porMedio = {}
      estado.saldosPorCuenta
        .filter(f => idsSet.has(f.cuenta_id))
        .forEach(f => {
          const cuenta = estado.cuentasPorId[f.cuenta_id]
          if (!cuenta || cuenta.moneda !== moneda) return
          if (!porMedio[cuenta.medio]) porMedio[cuenta.medio] = []
          porMedio[cuenta.medio].push({ ...cuenta, saldo: Number(f.saldo) })
        })

      const entradas = Object.entries(porMedio)
      if (!entradas.length) return ''

      const chips = entradas.map(([medio, cuentas]) => {
        if (conDueno) {
          const total = cuentas.reduce((acc, c) => acc + c.saldo, 0)
          if (cuentas.length === 1) {
            return `<span class="desglose-medio-pago__chip">${MEDIO_CUENTA_LABEL[medio] || medio}: ${formatearImporte(total, moneda)}</span>`
          }
          const filas = cuentas.map(c => `<div class="desglose-cuenta__fila">${estado.nombresEmpleados[c.empleado_id] || '—'} — ${c.nombre}: ${formatearImporte(c.saldo, moneda)}</div>`).join('')
          return `
            <details class="desglose-medio-pago__chip">
              <summary>${MEDIO_CUENTA_LABEL[medio] || medio}: ${formatearImporte(total, moneda)} ▾</summary>
              <div class="desglose-cuenta__resto">${filas}</div>
            </details>`
        }

        let principal = cuentas.find(c => c.favorita)
        if (!principal) principal = [...cuentas].sort((a, b) => new Date(a.created_at) - new Date(b.created_at))[0]
        const otras = cuentas.filter(c => c.id !== principal.id)

        if (!otras.length) {
          return `<span class="desglose-medio-pago__chip">${principal.nombre}: ${formatearImporte(principal.saldo, moneda)}</span>`
        }
        const filas = otras.map(c => `<div class="desglose-cuenta__fila">${c.nombre}: ${formatearImporte(c.saldo, moneda)}</div>`).join('')
        return `
          <details class="desglose-medio-pago__chip">
            <summary>${principal.nombre}: ${formatearImporte(principal.saldo, moneda)} ▾</summary>
            <div class="desglose-cuenta__resto">${filas}</div>
          </details>`
      }).join('')

      return `<div class="desglose-medio-pago">${chips}</div>`
    }

    function nombreEmpresa(unidadId) {
      return estado.maestros.unidadesNegocio.find(u => u.id === unidadId)?.nombre || null
    }

    // Devuelve el registro completo (rol_app, caja_raiz) del dueño de una
    // ficha, sea que esté en el listado (lo abrió un admin) o sea el propio
    // usuario logueado (entrada directa, nunca está en estado.empleados).
    function datosDePersona(empleadoId) {
      return estado.empleados.find(e => e.id === empleadoId) ||
        (estado.miEmpleado?.id === empleadoId ? estado.miEmpleado : null)
    }

    // Solo hay dos medios posibles — el "otro" es simplemente el que no es este.
    function otroMedioPago(medio) {
      return medio === 'efectivo' ? 'transferencia' : 'efectivo'
    }

    function etiquetaMovimiento(m) {
      if (m.tipo === 'egreso_transferencia') {
        return 'Entregado a ' + (estado.nombresEmpleados[m.contraparte_empleado_id] || '—')
      }
      if (m.tipo === 'egreso_traspaso') {
        return 'Traspaso a ' + MEDIO_PAGO_LABEL_CAJA[otroMedioPago(m.medio_pago)]
      }
      if (m.tipo === 'ingreso_traspaso') {
        return 'Traspaso desde ' + MEDIO_PAGO_LABEL_CAJA[otroMedioPago(m.medio_pago)]
      }
      return TIPO_LABEL[m.tipo] || m.tipo
    }

    // ═══════════════════════════════════════════════════════════════════════
    // CARGA DE DATOS — comunes a todos los roles
    // ═══════════════════════════════════════════════════════════════════════

    async function cargarSuperAdmins() {
      const { data, error } = await supabase.from('empleados').select('id, nombre, caja_raiz').eq('rol_app', 'super_admin')
      if (error) { mostrarError('No se pudieron cargar los super admins.'); return }
      estado.superAdmins = data || []
    }

    async function cargarNombresEmpleados() {
      const { data, error } = await supabase.from('empleados').select('id, nombre').eq('activo', true)
      if (error) { mostrarError('No se pudieron cargar los nombres de empleados.'); return }
      estado.nombresEmpleados = Object.fromEntries((data || []).map(e => [e.id, e.nombre]))
    }

    // ═══════════════════════════════════════════════════════════════════════
    // CARGA DE DATOS — Cuentas (medio+moneda con nombre propio)
    // ═══════════════════════════════════════════════════════════════════════

    // Fetcher genérico — trae TODAS las cuentas (activas e inactivas) de los
    // empleados pedidos y las vuelca en estado.cuentasPorId. No filtra por
    // activa acá a propósito, ver el comentario en la definición del estado.
    async function cargarCuentas(empleadoIds) {
      if (!empleadoIds.length) return
      const { data, error } = await supabase
        .from('cuentas_caja')
        .select('id, empleado_id, nombre, medio, moneda, favorita, activa, created_at')
        .in('empleado_id', empleadoIds)
      if (error) { mostrarError('No se pudieron cargar las cuentas.'); return }
      ;(data || []).forEach(c => { estado.cuentasPorId[c.id] = c })
    }

    async function cargarMisCuentas() {
      await cargarCuentas([estado.miEmpleado.id])
    }

    // On-demand: cuentas de una persona puntual (contraparte de un
    // ingreso/egreso, o dueño de un retiro hecho en su nombre).
    async function cargarCuentasDe(empleadoId) {
      await cargarCuentas([empleadoId])
    }

    async function cargarSaldosPorCuenta(cuentaIds) {
      if (!cuentaIds.length) { estado.saldosPorCuenta = []; return }
      const { data, error } = await supabase.from('v_caja_saldos_cuenta').select('cuenta_id, saldo').in('cuenta_id', cuentaIds)
      estado.saldosPorCuenta = error ? [] : (data || [])
    }

    function cuentasDe(empleadoId) {
      return Object.values(estado.cuentasPorId).filter(c => c.empleado_id === empleadoId && c.activa)
    }

    // ═══════════════════════════════════════════════════════════════════════
    // CARGA DE DATOS — Listado general (solo admin/super_admin)
    // ═══════════════════════════════════════════════════════════════════════

    async function cargarListado() {
      document.getElementById('estado-cargando').hidden = false

      const [empRes, unidRes] = await Promise.all([
        supabase.from('empleados').select('id, nombre, unidad_negocio_id, rol_app, caja_raiz').not('auth_user_id', 'is', null).eq('activo', true).order('nombre'),
        supabase.from('unidades_negocio').select('id, nombre').order('nombre'),
      ])

      if (empRes.error || unidRes.error) {
        document.getElementById('estado-cargando').hidden = true
        mostrarError('No se pudieron cargar las personas.')
        return
      }
      estado.empleados = empRes.data || []
      estado.maestros.unidadesNegocio = unidRes.data || []

      const ids = estado.empleados.map(e => e.id)

      const [saldosRes, movRes] = await Promise.all([
        ids.length
          ? supabase.from('v_caja_saldos').select('empleado_id, moneda, saldo').in('empleado_id', ids)
          : Promise.resolve({ data: [], error: null }),
        ids.length
          ? supabase.from('caja_movimientos').select('id', { count: 'exact', head: true }).in('empleado_id', ids).gte('fecha', fechaISO(new Date(new Date().getFullYear(), new Date().getMonth(), 1)))
          : Promise.resolve({ count: 0, error: null }),
        cargarMisSolicitudesPendientesCount(),
        cargarCuentas(ids),
      ])

      document.getElementById('estado-cargando').hidden = true

      if (saldosRes.error) {
        mostrarError('No se pudieron cargar los saldos.')
        return
      }
      estado.saldos = saldosRes.data || []
      estado.movimientosDelMes = movRes.count || 0

      // Las cuentas de todos los visibles ya están en estado.cuentasPorId
      // (recién cargadas arriba) — ahora sí puedo saber qué cuenta_ids traer.
      const cuentaIds = ids.flatMap(id => cuentasDe(id).map(c => c.id))
      await cargarSaldosPorCuenta(cuentaIds)

      renderizarStatTotal()
      renderizarListado()
    }

    // Cantidad de solicitudes pendientes donde YO (estado.miEmpleado) soy
    // origen o destino — badge del listado (CAMBIO 6). No depende de qué
    // ficha esté abierta, siempre es sobre quién está logueado.
    async function cargarMisSolicitudesPendientesCount() {
      const miId = estado.miEmpleado.id
      const { count, error } = await supabase
        .from('caja_solicitudes_movimiento')
        .select('id', { count: 'exact', head: true })
        .eq('estado', 'pendiente')
        .or(`origen_empleado_id.eq.${miId},destino_empleado_id.eq.${miId}`)
      estado.misSolicitudesPendientes = error ? 0 : (count || 0)
    }

    // Refresco liviano del badge para cuando NO hace falta recargar todo el
    // listado (Rechazar/Cancelar una solicitud — no mueven saldo).
    async function actualizarBadgePendientesListado() {
      await cargarMisSolicitudesPendientesCount()
      renderizarStatTotal()
    }

    // ═══════════════════════════════════════════════════════════════════════
    // RENDER — Card total de la empresa
    // ═══════════════════════════════════════════════════════════════════════

    function renderizarStatTotal() {
      const cont = document.getElementById('stat-total-empresa')

      const totalesPorMoneda = {}
      estado.saldos.forEach(s => { totalesPorMoneda[s.moneda] = (totalesPorMoneda[s.moneda] || 0) + Number(s.saldo) })
      const monedas = Object.keys(totalesPorMoneda)
      const empleadosConSaldo = new Set(estado.saldos.map(s => s.empleado_id)).size

      const montosHtml = monedas.length
        ? monedas.map(m => `<span class="stat-card-caja__monto">${formatearImporteConAlerta(totalesPorMoneda[m], m)}</span>`).join('')
        : `<span class="stat-card-caja__monto">${formatearImporte(0, 'ARS')}</span>`

      // Ya viene envuelto en .desglose-medio-pago (o '' si no hay filas) —
      // no hace falta un wrapper extra por moneda.
      const cuentaIdsVisibles = estado.empleados.flatMap(e => cuentasDe(e.id).map(c => c.id))
      const desgloseHtml = monedas
        .map(m => renderizarDesglosePorCuenta(cuentaIdsVisibles, m, { conDueno: true }))
        .join('')

      cont.innerHTML = `
        <div class="stat-card-caja">
          <div>
            <div class="stat-card-caja__label">Total de la empresa</div>
            <div class="stat-card-caja__montos">${montosHtml}</div>
            ${desgloseHtml}
          </div>
          <div class="stat-card-caja__submetrics">
            <div class="stat-card-caja__submetric">
              <div class="stat-card-caja__submetric-label">Con saldo</div>
              <div class="stat-card-caja__submetric-valor">${empleadosConSaldo}</div>
            </div>
            <div class="stat-card-caja__submetric">
              <div class="stat-card-caja__submetric-label">Mov. del mes</div>
              <div class="stat-card-caja__submetric-valor">${estado.movimientosDelMes}</div>
            </div>
            <div class="stat-card-caja__submetric">
              <div class="stat-card-caja__submetric-label">Pendientes</div>
              <div class="stat-card-caja__submetric-valor">${estado.misSolicitudesPendientes}</div>
            </div>
          </div>
        </div>
      `
    }

    // ═══════════════════════════════════════════════════════════════════════
    // RENDER — Listado agrupado por unidad de negocio
    // ═══════════════════════════════════════════════════════════════════════

    function agruparPersonas() {
      const porUnidad = new Map()
      estado.maestros.unidadesNegocio.forEach(u => porUnidad.set(u.id, { id: u.id, nombre: u.nombre, lista: [] }))
      const sinEmpresa = []

      estado.empleados.forEach(emp => {
        if (emp.unidad_negocio_id && porUnidad.has(emp.unidad_negocio_id)) {
          porUnidad.get(emp.unidad_negocio_id).lista.push(emp)
        } else {
          sinEmpresa.push(emp)
        }
      })

      const grupos = [...porUnidad.values()].filter(g => g.lista.length)
      if (sinEmpresa.length) grupos.push({ id: null, nombre: 'Sin empresa asignada', lista: sinEmpresa })

      grupos.forEach(g => g.lista.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || '', 'es', { sensitivity: 'base' })))
      return grupos
    }

    function subtotalGrupo(lista) {
      const totales = {}
      lista.forEach(emp => {
        saldosDe(emp.id).forEach(s => { totales[s.moneda] = (totales[s.moneda] || 0) + Number(s.saldo) })
      })
      return totales
    }

    function renderizarTarjetaPersona(emp) {
      const saldos = saldosDe(emp.id)
      const principal = saldos.find(s => s.moneda === 'ARS') || saldos[0] || { moneda: 'ARS', saldo: 0 }
      const negativoPrincipal = Number(principal.saldo) < 0
      const empresa = nombreEmpresa(emp.unidad_negocio_id)

      const otrasMonedas = saldos.length > 1
        ? `<div class="persona__monedas">${saldos.map(s => `
            <span class="chip-moneda ${Number(s.saldo) < 0 ? 'chip-moneda--negativo' : ''}">${s.moneda} ${formatearImporte(s.saldo, s.moneda)}</span>
          `).join('')}</div>`
        : ''

      return `
        <div class="tarjeta-lista" data-id="${emp.id}">
          <div class="tarjeta-lista__avatar" style="background:${colorAvatar(emp.nombre)};">${iniciales(emp.nombre)}</div>
          <div class="tarjeta-lista__info">
            <div class="tarjeta-lista__titulo">${emp.nombre}</div>
            ${empresa ? `<div class="tarjeta-lista__subtitulo">${empresa}</div>` : ''}
            ${otrasMonedas}
          </div>
          <div class="persona__saldo ${negativoPrincipal ? 'persona__saldo--negativo' : ''}">${formatearImporte(principal.saldo, principal.moneda)}</div>
        </div>
      `
    }

    function renderizarListado() {
      const cont = document.getElementById('lista-personas')
      const termino = (estado.filtros.busqueda || '').trim().toLowerCase()

      // El buscador solo oculta filas/grupos — el agrupamiento y el orden ya
      // calculados en agruparPersonas() no se tocan.
      let grupos = agruparPersonas()
      grupos = grupos
        .map(g => ({ ...g, lista: termino ? g.lista.filter(e => (e.nombre || '').toLowerCase().includes(termino)) : g.lista }))
        .filter(g => g.lista.length)

      if (!grupos.length) {
        cont.innerHTML = ''
        document.getElementById('estado-vacio-caja').hidden = false
        return
      }
      document.getElementById('estado-vacio-caja').hidden = true

      cont.innerHTML = grupos.map(g => {
        const totales = subtotalGrupo(g.lista)
        const subtotalHtml = Object.entries(totales).map(([moneda, total]) => `
          <span class="${Number(total) < 0 ? 'grupo-personas__subtotal--negativo' : ''}">${formatearImporte(total, moneda)}</span>
        `).join('')

        return `
          <div class="grupo-personas">
            <div class="grupo-personas__titulo">
              <span class="grupo-personas__nombre"><span class="grupo-personas__punto"></span>${g.nombre} <span style="font-weight:500;">· ${g.lista.length}</span></span>
              <span class="grupo-personas__subtotales">${subtotalHtml}</span>
            </div>
            <div class="lista-personas">
              ${g.lista.map(renderizarTarjetaPersona).join('')}
            </div>
          </div>
        `
      }).join('')

      cont.querySelectorAll('.tarjeta-lista').forEach(el => {
        el.addEventListener('click', () => abrirDetallePersona(el.dataset.id, 'listado'))
      })
    }

    // ═══════════════════════════════════════════════════════════════════════
    // VISTA — Ficha de persona
    // ═══════════════════════════════════════════════════════════════════════

    async function abrirDetallePersona(empleadoId, origen) {
      const emp = origen === 'listado'
        ? estado.empleados.find(e => e.id === empleadoId)
        : estado.miEmpleado
      if (!emp) return

      estado.personaAbierta = empleadoId
      estado.origenFicha = origen
      document.getElementById('detalle-persona-nombre').textContent = emp.nombre

      document.getElementById('vista-lista-caja').hidden = true
      document.getElementById('vista-detalle-persona').removeAttribute('hidden')

      // Entrada directa (rol 'usuario'): nunca se cargó el listado general —
      // acá se piden únicamente los saldos propios, no los de nadie más.
      // Las cuentas propias ya están cargadas desde init() (cargarMisCuentas).
      if (origen === 'directo') {
        const { data, error } = await supabase.from('v_caja_saldos').select('empleado_id, moneda, saldo').eq('empleado_id', empleadoId)
        if (error) mostrarError('No se pudieron cargar los saldos.')
        estado.saldos = data || []
      }

      const cuentaIds = cuentasDe(empleadoId).map(c => c.id)
      await cargarSaldosPorCuenta(cuentaIds)

      renderizarSaldosDetalle(empleadoId)
      renderizarAccionesDetalle(empleadoId)
      renderizarSeccionCuentas(empleadoId)

      document.getElementById('detalle-persona-movimientos').innerHTML = ''
      document.getElementById('detalle-persona-vacio').hidden = true
      document.getElementById('detalle-persona-solicitudes').innerHTML = ''

      await Promise.all([cargarMovimientos(empleadoId), cargarSolicitudesPendientes(empleadoId)])
    }

    function cerrarDetallePersona() {
      document.getElementById('vista-detalle-persona').hidden = true
      document.getElementById('vista-lista-caja').removeAttribute('hidden')
      estado.personaAbierta = null
    }

    function renderizarSaldosDetalle(empleadoId) {
      const saldos = saldosDe(empleadoId)
      const cont = document.getElementById('detalle-persona-saldos')
      const lista = saldos.length ? saldos : [{ moneda: 'ARS', saldo: 0 }]
      const cuentaIds = cuentasDe(empleadoId).map(c => c.id)

      cont.innerHTML = `<div class="saldos-grilla">${lista.map(s => {
        const desglose = renderizarDesglosePorCuenta(cuentaIds, s.moneda)
        return `
        <div class="saldo-card">
          <div class="saldo-card__label">Saldo ${s.moneda}</div>
          <div class="saldo-card__valor">${formatearImporteConAlerta(s.saldo, s.moneda)}</div>
          ${desglose}
        </div>
      `}).join('')}</div>`
    }

    function renderizarAccionesDetalle(empleadoId) {
      const cont = document.getElementById('detalle-persona-acciones')
      const botones = []

      // Ingreso y Egreso: solo en la propia ficha — ya no existe el flujo de
      // "elegir cualquier empleado desde el listado" (ver abrirModalMovimiento).
      // Para Pablo (caja_raiz) el botón de ingreso es "Ingreso externo" —
      // atómico, sin contraparte, sin cambios respecto de antes. Para
      // cualquier otro es "Añadir ingreso" — crea una solicitud pendiente.
      if (empleadoId === estado.miEmpleado.id) {
        const persona = datosDePersona(empleadoId)
        const esRaiz = !!persona?.caja_raiz
        botones.push(`<button type="button" class="btn btn--amarillo" id="btn-detalle-ingreso" style="flex:1 1 45%;">${esRaiz ? 'Ingreso externo' : 'Añadir ingreso'}</button>`)
        botones.push(`<button type="button" class="btn btn--navy-outline" id="btn-detalle-egreso" style="flex:1 1 45%;">Egreso</button>`)
      }

      // Retiro personal: sin cambios — sigue soportando actuar por otro
      // (la RPC registrar_retiro_caja sí acepta p_empleado_id).
      botones.push(`<button type="button" class="btn btn--bordo-outline" id="btn-detalle-retiro" style="flex:1 1 45%;">Retiro personal</button>`)

      // Traspaso: mueve plata entre medios DENTRO de la propia caja. Solo
      // tiene sentido en la ficha propia (la RPC no acepta p_empleado_id,
      // siempre opera sobre quien la llama) — para cualquier rol_app.
      if (empleadoId === estado.miEmpleado.id) {
        botones.push(`<button type="button" class="btn btn--navy-outline" id="btn-detalle-traspaso" style="flex:1 1 45%;">Traspaso</button>`)
      }

      cont.innerHTML = botones.join('')

      document.getElementById('btn-detalle-ingreso')?.addEventListener('click', () => abrirModalMovimiento('ingreso', empleadoId))
      document.getElementById('btn-detalle-egreso')?.addEventListener('click', () => abrirModalMovimiento('egreso', empleadoId))
      document.getElementById('btn-detalle-retiro')?.addEventListener('click', () => abrirModalMovimiento('retiro', empleadoId))
      document.getElementById('btn-detalle-traspaso')?.addEventListener('click', () => abrirModalTraspaso())
    }

    document.getElementById('btn-volver-ficha').addEventListener('click', () => {
      if (estado.origenFicha === 'listado') {
        cerrarDetallePersona()
      } else {
        window.location.href = '../dashboard.html'
      }
    })

    // ═══════════════════════════════════════════════════════════════════════
    // CARGA + RENDER — Movimientos
    // ═══════════════════════════════════════════════════════════════════════

    async function cargarMovimientos(empleadoId) {
      document.getElementById('estado-cargando-movimientos').hidden = false

      const { data, error } = await supabase
        .from('caja_movimientos')
        .select(`
          id, tipo, monto, moneda, medio_pago, cuenta_id, descripcion, fecha, gasto_id, contraparte_empleado_id,
          gastos ( razon_social, categorias ( nombre ) )
        `)
        .eq('empleado_id', empleadoId)
        .order('fecha', { ascending: false })
        .order('created_at', { ascending: false })

      document.getElementById('estado-cargando-movimientos').hidden = true

      if (error) {
        mostrarError('No se pudieron cargar los movimientos.')
        return
      }
      estado.movimientos = data || []
      renderizarMovimientos()
    }

    function renderizarFilaMovimiento(m, { mostrarPersona = false } = {}) {
      const esPositivo = m.tipo === 'ingreso' || m.tipo === 'ingreso_externo' || m.tipo === 'ingreso_traspaso'
      const signo = esPositivo ? '+' : '−'

      const personaHtml = mostrarPersona
        ? `<div class="movimiento__persona">${estado.nombresEmpleados[m.empleado_id] || '—'}</div>`
        : ''

      const sublineaContraparte = (m.tipo === 'ingreso' && m.contraparte_empleado_id)
        ? `<div class="movimiento__contraparte">de ${estado.nombresEmpleados[m.contraparte_empleado_id] || '—'}</div>`
        : ''

      const refGasto = (m.gasto_id && m.gastos)
        ? `<div class="movimiento__referencia">${m.gastos.razon_social || 'Gasto'}${m.gastos.categorias?.nombre ? ' · ' + m.gastos.categorias.nombre : ''} — <a href="gastos.html?gasto=${m.gasto_id}">Ver gasto →</a></div>`
        : ''

      // Si el movimiento tiene cuenta_id, mostramos el nombre de la cuenta
      // en vez de la etiqueta genérica de medio — los movimientos viejos (o
      // los que vienen de Gastos, que no maneja cuentas) no la tienen y
      // caen al fallback de siempre.
      const nombreCuenta = m.cuenta_id ? estado.cuentasPorId[m.cuenta_id]?.nombre : null
      const etiquetaMedio = nombreCuenta || MEDIO_PAGO_LABEL_CAJA[m.medio_pago] || m.medio_pago

      return `
        <div class="tarjeta-movimiento">
          <div class="movimiento__cabecera">
            <div class="movimiento__info">
              ${personaHtml}
              <span class="chip-tipo-movimiento chip-tipo-movimiento--${m.tipo}">${etiquetaMovimiento(m)}</span>
              ${sublineaContraparte}
              <div class="movimiento__fecha">${formatearFecha(m.fecha)} · ${etiquetaMedio}</div>
              ${m.descripcion ? `<div class="movimiento__descripcion">${m.descripcion}</div>` : ''}
              ${refGasto}
            </div>
            <div class="movimiento__monto">${signo} ${formatearImporte(m.monto, m.moneda)}</div>
          </div>
        </div>
      `
    }

    function renderizarMovimientos() {
      const cont = document.getElementById('detalle-persona-movimientos')

      if (!estado.movimientos.length) {
        cont.innerHTML = ''
        document.getElementById('detalle-persona-vacio').hidden = false
        return
      }
      document.getElementById('detalle-persona-vacio').hidden = true
      // OJO: no pasar renderizarFilaMovimiento directo a .map() — Array.map
      // manda (elemento, índice, array) y el índice pisaría el parámetro
      // { mostrarPersona } de la función.
      cont.innerHTML = estado.movimientos.map(m => renderizarFilaMovimiento(m)).join('')
    }

    // ═══════════════════════════════════════════════════════════════════════
    // SOLICITUDES DE MOVIMIENTO PENDIENTES (Ingreso/Egreso a confirmar)
    // ═══════════════════════════════════════════════════════════════════════

    // Trae las solicitudes pendientes DE LA FICHA (empleadoId como origen o
    // destino) — la tabla es simétrica, no guarda si "es un ingreso o un
    // egreso": eso se interpreta al renderizar, según quién esté logueado.
    async function cargarSolicitudesPendientes(empleadoId) {
      const { data, error } = await supabase
        .from('caja_solicitudes_movimiento')
        .select('id, origen_empleado_id, destino_empleado_id, monto, moneda, medio_pago, cuenta_origen_id, cuenta_destino_id, fecha, descripcion, estado, creado_por')
        .or(`origen_empleado_id.eq.${empleadoId},destino_empleado_id.eq.${empleadoId}`)
        .eq('estado', 'pendiente')
        .order('fecha', { ascending: false })

      if (error) { mostrarError('No se pudieron cargar las solicitudes pendientes.'); return }
      estado.solicitudesPendientes = data || []

      // Para resolver el nombre de cuenta de las dos partes (CAMBIO 8) hace
      // falta tener sus cuentas cargadas — puede que la contraparte no esté
      // entre las ya cargadas (ej. un 'usuario' viendo su propia ficha con
      // una solicitud hacia un super_admin cuyas cuentas nunca se pidieron).
      const idsAResolver = new Set()
      estado.solicitudesPendientes.forEach(s => { idsAResolver.add(s.origen_empleado_id); idsAResolver.add(s.destino_empleado_id) })
      await cargarCuentas([...idsAResolver])

      renderizarSolicitudesPendientes()
    }

    // Por fila: si YO (estado.miEmpleado.id) soy una de las dos partes y no
    // soy quien la creó → tengo que responder (Aceptar/Rechazar). Si soy
    // quien la creó → estoy esperando (Cancelar). Si no soy ninguna de las
    // dos (la estoy mirando de tercero, con permiso de admin/super_admin) →
    // solo informativo, sin botones.
    function renderizarFilaSolicitud(s) {
      const miId = estado.miEmpleado.id
      const nombreOrigen  = estado.nombresEmpleados[s.origen_empleado_id]  || '—'
      const nombreDestino = estado.nombresEmpleados[s.destino_empleado_id] || '—'
      const importe = formatearImporte(s.monto, s.moneda)

      const soyOrigen  = miId === s.origen_empleado_id
      const soyDestino = miId === s.destino_empleado_id
      const soyCreador = miId === s.creado_por

      let acciones = ''
      if ((soyOrigen || soyDestino) && !soyCreador) {
        acciones = `
          <div class="tarjeta-solicitud__acciones">
            <button type="button" class="btn btn--secundario" data-accion="rechazar" data-id="${s.id}">Rechazar</button>
            <button type="button" class="btn btn--exito" data-accion="aceptar" data-id="${s.id}">Aceptar</button>
          </div>`
      } else if (soyCreador) {
        const nombreContraparte = soyOrigen ? nombreDestino : nombreOrigen
        acciones = `
          <div class="tarjeta-solicitud__espera">Esperando que ${nombreContraparte} la confirme</div>
          <div class="tarjeta-solicitud__acciones">
            <button type="button" class="btn btn--secundario" data-accion="cancelar" data-id="${s.id}">Cancelar</button>
          </div>`
      }

      const nombreCuentaOrigen  = s.cuenta_origen_id  ? estado.cuentasPorId[s.cuenta_origen_id]?.nombre  : null
      const nombreCuentaDestino = s.cuenta_destino_id ? estado.cuentasPorId[s.cuenta_destino_id]?.nombre : null
      const detalleCuentas = (nombreCuentaOrigen || nombreCuentaDestino)
        ? ` (${nombreCuentaOrigen || '—'} → ${nombreCuentaDestino || '—'})`
        : ''

      return `
        <div class="tarjeta-solicitud">
          <div class="tarjeta-solicitud__monto">${importe}</div>
          <div class="tarjeta-solicitud__detalle">${nombreOrigen} → ${nombreDestino} · ${MEDIO_PAGO_LABEL_CAJA[s.medio_pago] || s.medio_pago}${detalleCuentas} · ${formatearFecha(s.fecha)}</div>
          ${s.descripcion ? `<div class="tarjeta-solicitud__detalle">${s.descripcion}</div>` : ''}
          ${acciones}
        </div>`
    }

    function renderizarSolicitudesPendientes() {
      const cont = document.getElementById('detalle-persona-solicitudes')

      if (!estado.solicitudesPendientes.length) {
        cont.innerHTML = ''
        return
      }

      cont.innerHTML = `
        <div class="modal-ficha__seccion-titulo">Solicitudes pendientes</div>
        ${estado.solicitudesPendientes.map(renderizarFilaSolicitud).join('')}
      `

      cont.querySelectorAll('[data-accion="aceptar"]').forEach(btn => {
        btn.addEventListener('click', () => responderSolicitud(btn.dataset.id, true))
      })
      cont.querySelectorAll('[data-accion="rechazar"]').forEach(btn => {
        btn.addEventListener('click', () => abrirModalRechazo(btn.dataset.id))
      })
      cont.querySelectorAll('[data-accion="cancelar"]').forEach(btn => {
        btn.addEventListener('click', () => cancelarSolicitud(btn.dataset.id))
      })
    }

    // Refresco tras Aceptar/Rechazar/Cancelar. cambioSaldo solo es true al
    // Aceptar — es el único caso en que recién ahí se mueve la plata (mismo
    // patrón de refresco que guardarMovimiento/guardarTraspaso).
    async function refrescarTrasResolucionSolicitud(cambioSaldo) {
      const empleadoId = estado.personaAbierta

      if (cambioSaldo) {
        await refrescarSaldosDeFicha(empleadoId)
      } else if (estado.origenFicha === 'listado') {
        await actualizarBadgePendientesListado()
      }

      if (empleadoId) {
        await cargarMovimientos(empleadoId)
        await cargarSolicitudesPendientes(empleadoId)
      }
    }

    async function responderSolicitud(id, aceptar) {
      const { error } = await supabase.rpc('responder_solicitud_movimiento_caja', {
        p_solicitud_id: id, p_aceptar: aceptar,
      })
      if (error) { mostrarError(error.message || 'No se pudo responder la solicitud.'); return }
      mostrarExito('Solicitud aceptada.')
      await refrescarTrasResolucionSolicitud(true)
    }

    let solicitudARechazarId = null

    function abrirModalRechazo(id) {
      solicitudARechazarId = id
      document.getElementById('rechazo-motivo').value = ''
      document.getElementById('modal-rechazo').hidden = false
    }

    function cerrarModalRechazo() {
      document.getElementById('modal-rechazo').hidden = true
      solicitudARechazarId = null
    }

    async function confirmarRechazo() {
      const motivo = document.getElementById('rechazo-motivo').value.trim()
      if (!motivo) { mostrarError('Ingresá el motivo del rechazo.'); return }

      const { error } = await supabase.rpc('responder_solicitud_movimiento_caja', {
        p_solicitud_id: solicitudARechazarId, p_aceptar: false, p_motivo_rechazo: motivo,
      })
      if (error) { mostrarError(error.message || 'No se pudo rechazar la solicitud.'); return }

      mostrarExito('Solicitud rechazada.')
      cerrarModalRechazo()
      await refrescarTrasResolucionSolicitud(false)
    }

    async function cancelarSolicitud(id) {
      const { error } = await supabase.rpc('cancelar_solicitud_movimiento_caja', { p_solicitud_id: id })
      if (error) { mostrarError(error.message || 'No se pudo cancelar la solicitud.'); return }
      mostrarExito('Solicitud cancelada.')
      await refrescarTrasResolucionSolicitud(false)
    }

    document.getElementById('btn-cerrar-rechazo').addEventListener('click', cerrarModalRechazo)
    document.getElementById('btn-cancelar-rechazo').addEventListener('click', cerrarModalRechazo)
    document.getElementById('modal-rechazo__backdrop').addEventListener('click', cerrarModalRechazo)
    document.getElementById('btn-confirmar-rechazo').addEventListener('click', confirmarRechazo)

    // ═══════════════════════════════════════════════════════════════════════
    // GESTIÓN DE CUENTAS PROPIAS (CAMBIO 2)
    // ═══════════════════════════════════════════════════════════════════════

    function renderizarFilaCuenta(c) {
      const fila = estado.saldosPorCuenta.find(s => s.cuenta_id === c.id)
      const saldo = formatearImporte(fila ? Number(fila.saldo) : 0, c.moneda)
      const accionesHtml = c.favorita ? '' : `
        <div class="tarjeta-cuenta__acciones">
          <button type="button" class="btn btn--secundario" data-accion="favorita-cuenta" data-id="${c.id}">Marcar favorita</button>
          <button type="button" class="btn btn--secundario" data-accion="desactivar-cuenta" data-id="${c.id}">Desactivar</button>
        </div>`
      return `
        <div class="tarjeta-cuenta">
          <div>
            <div class="tarjeta-cuenta__nombre">${c.nombre}${c.favorita ? ' <span class="chip-favorita">★ Favorita</span>' : ''}</div>
            <div class="tarjeta-cuenta__saldo">${c.moneda} · ${saldo}</div>
          </div>
          ${accionesHtml}
        </div>`
    }

    function renderizarSeccionCuentas(empleadoId) {
      const cont = document.getElementById('detalle-persona-cuentas')
      if (empleadoId !== estado.miEmpleado.id) { cont.innerHTML = ''; return }

      const misCuentas = cuentasDe(empleadoId)
      const grupos = [
        { medio: 'efectivo', cuentas: misCuentas.filter(c => c.medio === 'efectivo') },
        { medio: 'banco',    cuentas: misCuentas.filter(c => c.medio === 'banco') },
      ]

      cont.innerHTML = `
        <div class="modal-ficha__seccion-titulo">Mis cuentas</div>
        ${grupos.map(g => `
          <div class="grupo-cuentas">
            <div class="grupo-cuentas__titulo">${MEDIO_CUENTA_LABEL[g.medio]}</div>
            ${g.cuentas.length ? g.cuentas.map(renderizarFilaCuenta).join('') : '<p class="etiqueta-opcional">Sin cuentas</p>'}
          </div>
        `).join('')}
        <button type="button" class="btn btn--secundario" id="btn-nueva-cuenta" style="margin-top:0.5rem;">+ Nueva cuenta</button>
      `

      document.getElementById('btn-nueva-cuenta').addEventListener('click', abrirModalCuentaNueva)
      cont.querySelectorAll('[data-accion="favorita-cuenta"]').forEach(btn => {
        btn.addEventListener('click', () => marcarCuentaFavorita(btn.dataset.id))
      })
      cont.querySelectorAll('[data-accion="desactivar-cuenta"]').forEach(btn => {
        btn.addEventListener('click', () => desactivarCuenta(btn.dataset.id))
      })
    }

    // Recarga cuentas + saldos por cuenta de una persona y vuelve a pintar
    // tanto la card de saldo (CAMBIO 3) como la sección de cuentas (CAMBIO 2).
    async function refrescarCuentasYSaldos(empleadoId) {
      await cargarCuentas([empleadoId])
      await cargarSaldosPorCuenta(cuentasDe(empleadoId).map(c => c.id))
      renderizarSaldosDetalle(empleadoId)
      renderizarSeccionCuentas(empleadoId)
    }

    async function marcarCuentaFavorita(id) {
      const { error } = await supabase.rpc('marcar_cuenta_favorita_caja', { p_cuenta_id: id })
      if (error) { mostrarError(error.message || 'No se pudo marcar la cuenta como favorita.'); return }
      mostrarExito('Cuenta marcada como favorita.')
      await refrescarCuentasYSaldos(estado.miEmpleado.id)
    }

    async function desactivarCuenta(id) {
      const { error } = await supabase.rpc('desactivar_cuenta_caja', { p_cuenta_id: id })
      if (error) { mostrarError(error.message || 'No se pudo desactivar la cuenta.'); return }
      mostrarExito('Cuenta desactivada.')
      await refrescarCuentasYSaldos(estado.miEmpleado.id)
    }

    // Es la primera cuenta activa que tendría el usuario para esta
    // combinación medio+moneda — si es así, va a ser favorita sí o sí.
    function esPrimeraCuentaDeCombinacion(medio, moneda) {
      return !cuentasDe(estado.miEmpleado.id).some(c => c.medio === medio && c.moneda === moneda)
    }

    let medioCuentaNuevaSeleccionado = null

    function seleccionarMedioCuentaNueva(valor) {
      medioCuentaNuevaSeleccionado = valor
      document.querySelectorAll('#grilla-medio-cuenta-nueva .btn-tipo-doc').forEach(btn => {
        btn.classList.toggle('btn-tipo-doc--seleccionado', btn.dataset.valor === valor)
      })
      actualizarFormularioCuentaNueva()
    }

    document.querySelectorAll('#grilla-medio-cuenta-nueva .btn-tipo-doc').forEach(btn => {
      btn.addEventListener('click', () => seleccionarMedioCuentaNueva(btn.dataset.valor))
    })
    document.getElementById('cuenta-moneda').addEventListener('change', actualizarFormularioCuentaNueva)

    // Si es la primera cuenta de esa combinación no tiene sentido dejar
    // elegir "no favorita" — no hay ninguna otra con la que competir.
    function actualizarFormularioCuentaNueva() {
      const checkboxLabel = document.getElementById('cuenta-favorita').closest('label')
      const nota = document.getElementById('cuenta-favorita-nota')
      if (!medioCuentaNuevaSeleccionado) { checkboxLabel.hidden = false; nota.hidden = true; return }

      const moneda = document.getElementById('cuenta-moneda').value
      if (esPrimeraCuentaDeCombinacion(medioCuentaNuevaSeleccionado, moneda)) {
        checkboxLabel.hidden = true
        nota.hidden = false
        nota.textContent = `Va a ser tu cuenta principal en ${MEDIO_CUENTA_LABEL[medioCuentaNuevaSeleccionado]} ${moneda}.`
      } else {
        checkboxLabel.hidden = false
        nota.hidden = true
      }
    }

    function abrirModalCuentaNueva() {
      document.getElementById('cuenta-nombre').value = ''
      document.getElementById('cuenta-moneda').value = 'ARS'
      document.getElementById('cuenta-favorita').checked = false
      seleccionarMedioCuentaNueva(null)
      document.getElementById('modal-cuenta-nueva').hidden = false
    }

    function cerrarModalCuentaNueva() {
      document.getElementById('modal-cuenta-nueva').hidden = true
    }

    async function guardarCuentaNueva() {
      const nombre = document.getElementById('cuenta-nombre').value.trim()
      const medio  = medioCuentaNuevaSeleccionado
      const moneda = document.getElementById('cuenta-moneda').value

      if (!nombre) { mostrarError('Ingresá un nombre para la cuenta.'); return }
      if (!medio) { mostrarError('Elegí el medio.'); return }

      const favorita = esPrimeraCuentaDeCombinacion(medio, moneda) || document.getElementById('cuenta-favorita').checked

      const btn = document.getElementById('btn-guardar-cuenta-nueva')
      btn.classList.add('btn--cargando')
      btn.disabled = true

      try {
        const { error } = await supabase.rpc('crear_cuenta_caja', { p_nombre: nombre, p_medio: medio, p_moneda: moneda, p_favorita: favorita })
        if (error) throw error
        mostrarExito('Cuenta creada.')
        cerrarModalCuentaNueva()
        await refrescarCuentasYSaldos(estado.miEmpleado.id)
      } catch (err) {
        mostrarError(err.message || 'No se pudo crear la cuenta.')
      } finally {
        btn.classList.remove('btn--cargando')
        btn.disabled = false
      }
    }

    document.getElementById('btn-cerrar-cuenta-nueva').addEventListener('click', cerrarModalCuentaNueva)
    document.getElementById('btn-cancelar-cuenta-nueva').addEventListener('click', cerrarModalCuentaNueva)
    document.getElementById('modal-cuenta-nueva__backdrop').addEventListener('click', cerrarModalCuentaNueva)
    document.getElementById('btn-guardar-cuenta-nueva').addEventListener('click', guardarCuentaNueva)

    // ═══════════════════════════════════════════════════════════════════════
    // VISTA — Retiros personales (exclusiva rol_app === 'super_admin')
    // ═══════════════════════════════════════════════════════════════════════

    async function abrirRetirosPersonales() {
      document.getElementById('vista-lista-caja').hidden = true
      document.getElementById('vista-retiros-personales').removeAttribute('hidden')

      document.getElementById('estado-cargando-retiros').hidden = false
      document.getElementById('lista-retiros-personales').innerHTML = ''
      document.getElementById('estado-vacio-retiros').hidden = true

      const { data, error } = await supabase
        .from('caja_movimientos')
        .select('id, tipo, monto, moneda, medio_pago, cuenta_id, descripcion, fecha, empleado_id')
        .eq('tipo', 'egreso_retiro')
        .order('fecha', { ascending: false })
        .order('created_at', { ascending: false })

      document.getElementById('estado-cargando-retiros').hidden = true

      if (error) {
        mostrarError('No se pudieron cargar los retiros.')
        return
      }

      const retiros = data || []
      if (!retiros.length) {
        document.getElementById('estado-vacio-retiros').hidden = false
        return
      }
      document.getElementById('lista-retiros-personales').innerHTML =
        retiros.map(m => renderizarFilaMovimiento(m, { mostrarPersona: true })).join('')
    }

    function cerrarRetirosPersonales() {
      document.getElementById('vista-retiros-personales').hidden = true
      document.getElementById('vista-lista-caja').removeAttribute('hidden')
    }

    document.getElementById('btn-ver-retiros-personales').addEventListener('click', abrirRetirosPersonales)
    document.getElementById('btn-cerrar-retiros-personales').addEventListener('click', cerrarRetirosPersonales)
    document.getElementById('btn-mi-caja').addEventListener('click', () => abrirDetallePersona(estado.miEmpleado.id, 'listado'))

    // ═══════════════════════════════════════════════════════════════════════
    // MODAL — Registrar ingreso / egreso / retiro
    // ═══════════════════════════════════════════════════════════════════════

    // Arma el <select> de contraparte para Ingreso (subtipo 'propio') y
    // Egreso — según el rol_app de QUIEN ESTÁ MIRANDO (siempre soy yo mismo,
    // ya que ambos botones solo se abren desde la propia ficha):
    // - super_admin: cualquier otro empleado con acceso (la regla "al menos
    //   un super_admin de los dos lados" ya la cumplo yo mismo).
    // - admin o usuario: solo los rol_app='super_admin'.
    function poblarSelectorContraparte() {
      const contraparteSelect = document.getElementById('contraparte-select')
      const candidatos = estado.miEmpleado.rol_app === 'super_admin'
        ? estado.empleados.filter(e => e.id !== estado.miEmpleado.id)
        : estado.superAdmins.filter(s => s.id !== estado.miEmpleado.id)
      contraparteSelect.innerHTML = '<option value="">— Seleccioná —</option>' +
        candidatos.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('')
    }

    function opcionesCuenta(cuentas) {
      return '<option value="">— Seleccioná —</option>' +
        cuentas.map(c => `<option value="${c.id}">${c.nombre} (${MEDIO_CUENTA_LABEL[c.medio]} ${c.moneda})</option>`).join('')
    }

    // Retiro (en nombre propio o de otro) e Ingreso externo: un solo selector.
    function poblarSelectorCuentaUnica(empleadoId) {
      document.getElementById('cuenta-select').innerHTML = opcionesCuenta(cuentasDe(empleadoId))
    }

    // Ingreso propio / Egreso: "Tu cuenta" — siempre las propias.
    function poblarSelectorCuentaPropia() {
      document.getElementById('cuenta-propia-select').innerHTML = opcionesCuenta(cuentasDe(estado.miEmpleado.id))
    }

    // Ingreso propio / Egreso: "Cuenta de la contraparte" — se repuebla cada
    // vez que cambia la contraparte elegida o "Tu cuenta", filtrada a las
    // que coincidan en medio+moneda con la cuenta propia ya elegida. Si no
    // hay ninguna que matchee, muestra un mensaje en vez de dejarlo vacío.
    async function actualizarSelectorCuentaContraparte() {
      const grupo = document.getElementById('grupo-cuenta-contraparte')
      const sel   = document.getElementById('cuenta-contraparte-select')
      const vacio = document.getElementById('cuenta-contraparte-vacio')
      const label = document.getElementById('label-cuenta-contraparte')

      const contraparteId  = document.getElementById('contraparte-select').value
      const cuentaPropiaId = document.getElementById('cuenta-propia-select').value

      if (!contraparteId || !cuentaPropiaId) {
        grupo.style.display = 'none'
        return
      }
      grupo.style.display = 'flex'

      const cuentaPropia = estado.cuentasPorId[cuentaPropiaId]
      await cargarCuentasDe(contraparteId)

      const nombreContraparte = estado.nombresEmpleados[contraparteId] || 'Esta persona'
      label.textContent = `Cuenta de ${nombreContraparte}`

      const candidatas = cuentasDe(contraparteId).filter(c => c.medio === cuentaPropia.medio && c.moneda === cuentaPropia.moneda)

      if (!candidatas.length) {
        sel.hidden = true
        vacio.hidden = false
        vacio.textContent = `${nombreContraparte} no tiene ninguna cuenta de ${MEDIO_CUENTA_LABEL[cuentaPropia.medio]} en ${cuentaPropia.moneda}.`
      } else {
        sel.hidden = false
        vacio.hidden = true
        sel.innerHTML = opcionesCuenta(candidatas)
      }
    }

    document.getElementById('contraparte-select').addEventListener('change', actualizarSelectorCuentaContraparte)
    document.getElementById('cuenta-propia-select').addEventListener('change', actualizarSelectorCuentaContraparte)

    // tipo: 'ingreso' | 'egreso' | 'retiro'. empleadoId: dueño de la ficha
    // desde donde se abrió (siempre presente — ya no existe el flujo de
    // "elegir cualquier empleado" desde el listado, para ingreso ni egreso).
    async function abrirModalMovimiento(tipo, empleadoId) {
      estado.wizardMovimiento = { tipo, empleadoId }

      const grupoContraparte       = document.getElementById('grupo-contraparte')
      const labelContraparte       = document.getElementById('label-contraparte')
      const grupoCuentaPropia      = document.getElementById('grupo-cuenta-propia')
      const grupoCuentaContraparte = document.getElementById('grupo-cuenta-contraparte')
      const grupoCuentaUnica       = document.getElementById('grupo-cuenta-unica')
      const labelCuentaUnica       = document.getElementById('label-cuenta-unica')
      const avisoRetiro            = document.getElementById('aviso-retiro-personal')

      grupoCuentaPropia.style.display = 'none'
      grupoCuentaContraparte.style.display = 'none'
      grupoCuentaUnica.style.display = 'none'

      if (tipo === 'ingreso') {
        avisoRetiro.hidden = true

        const persona = datosDePersona(empleadoId)
        const esRaiz = !!persona?.caja_raiz
        estado.wizardMovimiento.subtipo = esRaiz ? 'externo' : 'propio'

        if (esRaiz) {
          // Ingreso externo (solo lo carga el propio caja_raiz sobre su
          // ficha — ver el filtro en renderizarAccionesDetalle): no hay
          // contraparte, el dinero entra de afuera del sistema, y sigue
          // siendo atómico — no pasa por el esquema de solicitudes.
          document.getElementById('movimiento-titulo').textContent = 'Ingreso externo'
          grupoContraparte.style.display = 'none'
          grupoCuentaUnica.style.display = 'flex'
          labelCuentaUnica.textContent = 'Cuenta'
          poblarSelectorCuentaUnica(empleadoId)
        } else {
          // Cualquier otro: crea una solicitud pendiente que la contraparte
          // tiene que aceptar — no mueve saldo todavía.
          document.getElementById('movimiento-titulo').textContent = 'Añadir ingreso'
          grupoContraparte.style.display = 'flex'
          labelContraparte.textContent = '¿Quién te dio la plata?'
          poblarSelectorContraparte()
          grupoCuentaPropia.style.display = 'flex'
          poblarSelectorCuentaPropia()
        }
      } else if (tipo === 'egreso') {
        document.getElementById('movimiento-titulo').textContent = 'Registrar egreso'
        avisoRetiro.hidden = true
        grupoContraparte.style.display = 'flex'
        labelContraparte.textContent = '¿A quién le vas a dar la plata?'
        poblarSelectorContraparte()
        grupoCuentaPropia.style.display = 'flex'
        poblarSelectorCuentaPropia()
      } else {
        grupoContraparte.style.display = 'none'
        document.getElementById('movimiento-titulo').textContent = 'Registrar retiro'
        if (empleadoId !== estado.miEmpleado.id) await cargarCuentasDe(empleadoId)
        grupoCuentaUnica.style.display = 'flex'
        labelCuentaUnica.textContent = 'Cuenta'
        poblarSelectorCuentaUnica(empleadoId)
        if (!esAdmin()) {
          avisoRetiro.textContent = 'Este retiro se descuenta de tu caja personal — no es un gasto de la empresa.'
          avisoRetiro.hidden = false
        } else {
          avisoRetiro.hidden = true
        }
      }

      document.getElementById('movimiento-monto').value = ''
      document.getElementById('movimiento-fecha').value = fechaISO(new Date())
      document.getElementById('movimiento-descripcion').value = ''

      document.getElementById('modal-movimiento').hidden = false
    }

    function cerrarModalMovimiento() {
      document.getElementById('modal-movimiento').hidden = true
    }

    // Refresca saldo total + por medio + por cuenta de una ficha después de
    // un movimiento que SÍ cambió saldo — mismo patrón "directo vs listado"
    // de siempre. La usan las 3 acciones atómicas (ingreso externo, retiro,
    // traspaso) y aceptar una solicitud.
    async function refrescarSaldosDeFicha(empleadoId) {
      if (estado.origenFicha === 'directo') {
        // Rol 'usuario': jamás se dispara la consulta de "todos los empleados".
        const { data, error } = await supabase.from('v_caja_saldos').select('empleado_id, moneda, saldo').eq('empleado_id', empleadoId)
        if (error) mostrarError('No se pudieron cargar los saldos.')
        estado.saldos = data || []
        await cargarSaldosPorCuenta(cuentasDe(empleadoId).map(c => c.id))
      } else {
        // Ya recarga saldos + TODAS las cuentas/saldosPorCuenta visibles.
        await cargarListado()
      }
      if (estado.personaAbierta) renderizarSaldosDetalle(estado.personaAbierta)
    }

    async function guardarMovimiento() {
      const { tipo, subtipo, empleadoId } = estado.wizardMovimiento
      const monto       = parseImporte(document.getElementById('movimiento-monto').value)
      const fecha         = document.getElementById('movimiento-fecha').value || null
      const descripcion   = document.getElementById('movimiento-descripcion').value.trim() || null

      if (!monto || monto <= 0) { mostrarError('Ingresá un monto válido.'); return }

      const necesitaContraparte = (tipo === 'ingreso' && subtipo === 'propio') || tipo === 'egreso'
      let contraparteId = null, cuentaPropiaId = null, cuentaContraparteId = null, cuentaUnicaId = null

      if (necesitaContraparte) {
        contraparteId = document.getElementById('contraparte-select').value
        if (!contraparteId) {
          mostrarError(tipo === 'egreso' ? 'Elegí a quién le vas a dar la plata.' : 'Elegí quién te dio la plata.')
          return
        }
        cuentaPropiaId = document.getElementById('cuenta-propia-select').value
        if (!cuentaPropiaId) { mostrarError('Elegí tu cuenta.'); return }
        cuentaContraparteId = document.getElementById('cuenta-contraparte-select').value
        if (!cuentaContraparteId) { mostrarError('Elegí la cuenta de la contraparte.'); return }
      } else {
        cuentaUnicaId = document.getElementById('cuenta-select').value
        if (!cuentaUnicaId) { mostrarError('Elegí una cuenta.'); return }
      }

      const btn = document.getElementById('btn-guardar-movimiento')
      btn.classList.add('btn--cargando')
      btn.disabled = true

      const esPropio = empleadoId === estado.miEmpleado.id
      // Los únicos dos casos que TODAVÍA son atómicos (mueven saldo ya
      // mismo): ingreso externo (Pablo) y retiro. Ingreso propio y egreso
      // ahora solo crean una solicitud pendiente — ver CAMBIO 4/5.
      const esAtomico = (tipo === 'ingreso' && subtipo === 'externo') || tipo === 'retiro'

      try {
        let error
        if (tipo === 'ingreso' && subtipo === 'externo') {
          const params = { p_monto: monto, p_cuenta_id: cuentaUnicaId, p_descripcion: descripcion }
          if (fecha) params.p_fecha = fecha
          // ; a propósito: sin esto, ASI interpreta la línea de abajo como
          // una llamada — ver el comentario largo más abajo, mismo motivo.
          ;({ error } = await supabase.rpc('registrar_ingreso_externo_caja', params))
          if (error) throw error
          mostrarExito('Ingreso registrado.')
        } else if (tipo === 'ingreso' || tipo === 'egreso') {
          const params = {
            p_tipo: tipo, p_contraparte_empleado_id: contraparteId,
            p_monto: monto, p_cuenta_propia_id: cuentaPropiaId, p_cuenta_contraparte_id: cuentaContraparteId,
            p_descripcion: descripcion,
          }
          if (fecha) params.p_fecha = fecha
          ;({ error } = await supabase.rpc('crear_solicitud_movimiento_caja', params))
          if (error) throw error
          const nombreContraparte = estado.nombresEmpleados[contraparteId] || '—'
          mostrarExito(`Solicitud enviada, esperando confirmación de ${nombreContraparte}.`)
        } else {
          const params = { p_monto: monto, p_cuenta_id: cuentaUnicaId, p_descripcion: descripcion }
          if (fecha) params.p_fecha = fecha
          if (!esPropio) params.p_empleado_id = empleadoId
          ;({ error } = await supabase.rpc('registrar_retiro_caja', params))
          if (error) throw error
          mostrarExito('Retiro registrado.')
        }

        cerrarModalMovimiento()

        if (esAtomico) {
          await refrescarSaldosDeFicha(empleadoId)
          if (estado.personaAbierta) await cargarMovimientos(estado.personaAbierta)
        } else {
          // Ingreso propio / Egreso: solo se creó la solicitud, el saldo
          // todavía no cambió — alcanza con refrescar las solicitudes
          // pendientes de la ficha y el badge del listado.
          await cargarSolicitudesPendientes(empleadoId)
          if (estado.origenFicha === 'listado') await actualizarBadgePendientesListado()
        }
      } catch (err) {
        mostrarError(err.message || 'No se pudo registrar el movimiento.')
      } finally {
        btn.classList.remove('btn--cargando')
        btn.disabled = false
      }
    }

    document.getElementById('btn-cerrar-movimiento').addEventListener('click', cerrarModalMovimiento)
    document.getElementById('btn-cancelar-movimiento').addEventListener('click', cerrarModalMovimiento)
    document.getElementById('modal-movimiento__backdrop').addEventListener('click', cerrarModalMovimiento)
    document.getElementById('btn-guardar-movimiento').addEventListener('click', guardarMovimiento)

    document.getElementById('btn-retiro-personal-listado').addEventListener('click', () => abrirModalMovimiento('retiro', estado.miEmpleado.id))

    // ═══════════════════════════════════════════════════════════════════════
    // MODAL — Traspaso entre cuentas propias
    // ═══════════════════════════════════════════════════════════════════════

    function poblarSelectoresTraspaso() {
      document.getElementById('traspaso-cuenta-origen').innerHTML = opcionesCuenta(cuentasDe(estado.miEmpleado.id))
      actualizarSelectorDestinoTraspaso()
    }

    // "Hacia" se repuebla cada vez que cambia "Desde" — nunca puede quedar
    // seleccionada la misma cuenta en los dos lados.
    function actualizarSelectorDestinoTraspaso() {
      const origenId = document.getElementById('traspaso-cuenta-origen').value
      const candidatas = cuentasDe(estado.miEmpleado.id).filter(c => c.id !== origenId)
      document.getElementById('traspaso-cuenta-destino').innerHTML = opcionesCuenta(candidatas)
      actualizarCampoMontoDestino()
    }

    // El campo "Monto que entra" solo tiene sentido si origen y destino
    // tienen distinta moneda — si es la misma, se manda el mismo valor.
    function actualizarCampoMontoDestino() {
      const origen  = estado.cuentasPorId[document.getElementById('traspaso-cuenta-origen').value]
      const destino = estado.cuentasPorId[document.getElementById('traspaso-cuenta-destino').value]
      document.getElementById('grupo-traspaso-monto-destino').hidden = !(origen && destino && origen.moneda !== destino.moneda)
    }

    document.getElementById('traspaso-cuenta-origen').addEventListener('change', actualizarSelectorDestinoTraspaso)
    document.getElementById('traspaso-cuenta-destino').addEventListener('change', actualizarCampoMontoDestino)

    function abrirModalTraspaso() {
      document.getElementById('traspaso-monto').value = ''
      document.getElementById('traspaso-monto-destino').value = ''
      document.getElementById('traspaso-fecha').value = fechaISO(new Date())
      poblarSelectoresTraspaso()
      document.getElementById('modal-traspaso').hidden = false
    }

    function cerrarModalTraspaso() {
      document.getElementById('modal-traspaso').hidden = true
    }

    async function guardarTraspaso() {
      const cuentaOrigenId  = document.getElementById('traspaso-cuenta-origen').value
      const cuentaDestinoId = document.getElementById('traspaso-cuenta-destino').value
      const monto           = parseImporte(document.getElementById('traspaso-monto').value)
      const fecha            = document.getElementById('traspaso-fecha').value || null

      if (!cuentaOrigenId || !cuentaDestinoId) { mostrarError('Elegí las dos cuentas.'); return }
      if (!monto || monto <= 0) { mostrarError('Ingresá un monto válido.'); return }

      const cuentaOrigen  = estado.cuentasPorId[cuentaOrigenId]
      const cuentaDestino = estado.cuentasPorId[cuentaDestinoId]
      let montoDestino = monto
      if (cuentaOrigen.moneda !== cuentaDestino.moneda) {
        montoDestino = parseImporte(document.getElementById('traspaso-monto-destino').value)
        if (!montoDestino || montoDestino <= 0) { mostrarError('Ingresá el monto que entra.'); return }
      }

      const btn = document.getElementById('btn-guardar-traspaso')
      btn.classList.add('btn--cargando')
      btn.disabled = true

      try {
        const params = {
          p_cuenta_origen_id: cuentaOrigenId, p_cuenta_destino_id: cuentaDestinoId,
          p_monto_origen: monto, p_monto_destino: montoDestino,
        }
        if (fecha) params.p_fecha = fecha
        const { error } = await supabase.rpc('registrar_traspaso_cuenta_caja', params)
        if (error) throw error

        mostrarExito('Traspaso registrado.')
        cerrarModalTraspaso()

        // El traspaso siempre es sobre la propia caja.
        await refrescarSaldosDeFicha(estado.miEmpleado.id)
        if (estado.personaAbierta) await cargarMovimientos(estado.personaAbierta)
      } catch (err) {
        mostrarError(err.message || 'No se pudo registrar el traspaso.')
      } finally {
        btn.classList.remove('btn--cargando')
        btn.disabled = false
      }
    }

    document.getElementById('btn-cerrar-traspaso').addEventListener('click', cerrarModalTraspaso)
    document.getElementById('btn-cancelar-traspaso').addEventListener('click', cerrarModalTraspaso)
    document.getElementById('modal-traspaso__backdrop').addEventListener('click', cerrarModalTraspaso)
    document.getElementById('btn-guardar-traspaso').addEventListener('click', guardarTraspaso)

    // ═══════════════════════════════════════════════════════════════════════
    // BÚSQUEDA Y FILTRO (listado general)
    // ═══════════════════════════════════════════════════════════════════════

    let debounceBusquedaCaja
    document.getElementById('filtro-busqueda-caja').addEventListener('input', (e) => {
      clearTimeout(debounceBusquedaCaja)
      const valor = e.target.value
      debounceBusquedaCaja = setTimeout(() => {
        estado.filtros.busqueda = valor
        renderizarListado()
      }, 250)
    })

    // ═══════════════════════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════════════════════

    async function init() {
      estado.sesion = await verificarSesion()
      if (!estado.sesion) return

      const { data: emp, error } = await supabase
        .from('empleados')
        .select('id, nombre, rol_app, caja_raiz')
        .eq('auth_user_id', estado.sesion.user.id)
        .maybeSingle()

      if (error || !emp) {
        mostrarError('No tenés permiso para acceder a este módulo.')
        setTimeout(() => window.location.replace('../dashboard.html'), 1500)
        return
      }

      estado.miEmpleado = emp

      // Comunes a todos los roles: hacen falta tanto en el listado (admin)
      // como en la ficha propia (usuario) para el modal de "Añadir ingreso".
      await Promise.all([cargarSuperAdmins(), cargarNombresEmpleados(), cargarMisCuentas()])

      if (emp.rol_app === 'super_admin') {
        document.getElementById('btn-ver-retiros-personales').style.display = 'inline-flex'
        document.getElementById('btn-mi-caja').style.display = 'inline-flex'
      }

      if (esAdmin()) {
        document.getElementById('vista-lista-caja').removeAttribute('hidden')
        await cargarListado()
      } else {
        // Rol 'usuario': entra directo a su propia ficha, sin listado general
        // ni total de la empresa — nunca ve saldos ni datos de nadie más.
        await abrirDetallePersona(emp.id, 'directo')
      }
    }

    init()
  </script>

</body>

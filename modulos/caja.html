<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caja — Seis Destinos</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#1a2a52">

  <style>
    body {
      overflow-x: hidden;
      --amarillo:        #C99A2E;
      --amarillo-suave:  #FBF3E0;
      --amarillo-oscuro: #8C6A1A;
      --bordo:           #7A2E42;
      --bordo-suave:     #F5E8EC;
      --bordo-oscuro:    #5C2233;
    }

    /* ── Toolbar: buscador + filtro empresa + acciones ────────────────────── */

    .caja-toolbar {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .caja-toolbar__buscar { flex: 1; min-width: 160px; }

    #filtro-busqueda-caja {
      width: 100%;
      height: 38px;
      padding: 0 0.875rem;
      border: 1.5px solid var(--color-borde);
      border-radius: 999px;
      font-family: var(--fuente);
      font-size: 0.8125rem;
      background: var(--color-fondo);
      color: var(--color-texto);
      outline: none;
    }

    #filtro-busqueda-caja:focus { border-color: var(--amarillo); }

    .caja-toolbar__acciones {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
      width: 100%;
    }

    @media (min-width: 560px) {
      .caja-toolbar__acciones { width: auto; }
    }

    .btn--amarillo {
      background: var(--amarillo);
      color: #fff;
      border: 1.5px solid var(--amarillo);
    }
    .btn--amarillo:hover { background: var(--amarillo-oscuro); border-color: var(--amarillo-oscuro); }

    .btn--bordo-outline {
      background: var(--color-fondo);
      color: var(--bordo);
      border: 1.5px solid var(--bordo);
    }
    .btn--bordo-outline:hover { background: var(--bordo-suave); }

    .btn--navy-outline {
      background: var(--color-fondo);
      color: var(--color-acento);
      border: 1.5px solid var(--color-acento);
    }
    .btn--navy-outline:hover { background: var(--color-superficie); }

    /* ── Card total de la empresa ──────────────────────────────────────────── */

    .stat-card-caja {
      background: linear-gradient(135deg, var(--amarillo), var(--amarillo-oscuro));
      color: #fff;
      border-radius: 18px;
      padding: 1.125rem 1.25rem;
      box-shadow: 0 8px 24px rgba(140,106,26,0.25);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin: 1.25rem 0;
    }

    .stat-card-caja__label {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .stat-card-caja__montos {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 1rem;
      margin-top: 0.25rem;
    }

    .stat-card-caja__monto {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* Desglose por medio de pago — un chip por medio, fondo oscuro semi-
       transparente sobre el degradado ámbar para que se lea con contraste sin
       salirse del sistema de colores (sin jerarquía frente al total: chips
       chicos, separados del monto principal). Se usa tanto en la card del
       listado como en la ficha de persona. */
    .desglose-medio-pago {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      margin-top: 0.625rem;
    }

    .desglose-medio-pago__chip {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.625rem;
      border-radius: 999px;
      background: rgba(0,0,0,0.18);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
    }

    /* Cuando el chip es expandible (más de una cuenta en esa combinación
       medio+moneda) es un <details> — cerrado se ve igual que un chip común;
       abierto pasa a ocupar todo el ancho para poder listar el resto debajo. */
    .desglose-medio-pago__chip summary {
      cursor: pointer;
      list-style: none;
    }
    .desglose-medio-pago__chip summary::-webkit-details-marker { display: none; }
    .desglose-medio-pago__chip[open] {
      display: block;
      width: 100%;
      border-radius: 12px;
    }

    .desglose-cuenta__resto {
      margin-top: 0.375rem;
      padding-top: 0.375rem;
      border-top: 1px solid rgba(255,255,255,0.25);
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .desglose-cuenta__fila {
      font-size: 0.8125rem;
      font-weight: 500;
      opacity: 0.9;
    }

    .stat-card-caja__submetrics { display: flex; gap: 0.5rem; flex-shrink: 0; }

    .stat-card-caja__submetric {
      background: rgba(255,255,255,0.16);
      border-radius: 12px;
      padding: 0.5rem 0.875rem;
      text-align: center;
    }

    .stat-card-caja__submetric-label {
      font-size: 0.5625rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.85;
    }

    .stat-card-caja__submetric-valor { font-size: 1.125rem; font-weight: 700; margin-top: 0.125rem; }

    /* Chip para valores negativos sobre fondo ámbar (única excepción de color: bordó) */
    .valor-negativo-chip {
      display: inline-flex;
      background: rgba(255,255,255,0.92);
      color: var(--bordo);
      padding: 0.0625rem 0.5rem;
      border-radius: 8px;
    }

    /* ── Grupos por unidad de negocio ──────────────────────────────────────── */

    .grupo-personas { margin-bottom: 1.5rem; }

    .grupo-personas__titulo {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.5rem;
      font-size: 0.8125rem;
      font-weight: 700;
      color: var(--color-texto-suave);
      margin-bottom: 0.5rem;
    }

    .grupo-personas__nombre { display: flex; align-items: center; gap: 0.375rem; }

    .grupo-personas__punto {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--amarillo);
      flex-shrink: 0;
    }

    .grupo-personas__subtotales { display: flex; gap: 0.5rem; font-weight: 600; color: var(--color-texto); }

    .grupo-personas__subtotal--negativo { color: var(--bordo); }

    .lista-personas {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    /* Ajuste local sobre la card compartida: iniciales en blanco. */
    .tarjeta-lista__avatar { color: #fff; }

    .persona__monedas {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      margin-top: 0.375rem;
    }

    .chip-moneda {
      display: inline-flex;
      align-items: center;
      padding: 0.1875rem 0.5rem;
      border-radius: 999px;
      background: var(--amarillo-suave);
      color: var(--amarillo-oscuro);
      font-size: 0.6875rem;
      font-weight: 700;
    }

    .chip-moneda--negativo {
      background: var(--bordo-suave);
      color: var(--bordo);
    }

    .persona__saldo {
      font-size: 1.0625rem;
      font-weight: 700;
      color: var(--color-acento);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .persona__saldo--negativo { color: var(--bordo); }

    /* ── Vista detalle de persona ─────────────────────────────────────────── */

    #vista-detalle-persona:not([hidden]) {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: var(--color-superficie);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .saldos-grilla {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.75rem;
    }

    .saldo-card {
      background: linear-gradient(135deg, var(--amarillo), var(--amarillo-oscuro));
      color: #fff;
      border-radius: 18px;
      padding: 1.125rem 1.25rem;
      box-shadow: 0 8px 24px rgba(140,106,26,0.25);
    }

    .saldo-card__label {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .saldo-card__valor {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-top: 0.25rem;
    }

    /* ── Movimientos ───────────────────────────────────────────────────────── */

    .lista-movimientos {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .tarjeta-movimiento {
      background: var(--color-fondo);
      border: 1px solid var(--color-borde);
      border-radius: 12px;
      padding: 0.75rem 1rem;
    }

    .movimiento__cabecera {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .movimiento__info { flex: 1; min-width: 0; }

    .chip-tipo-movimiento {
      display: inline-flex;
      align-items: center;
      padding: 0.1875rem 0.625rem;
      border-radius: 999px;
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    /* Un color por tipo de movimiento — bordó sigue siendo el único color de
       alerta (solo retiro), el resto son identificadores neutros, no avisos. */
    .chip-tipo-movimiento--ingreso,
    .chip-tipo-movimiento--ingreso_externo {
      background: var(--amarillo-suave);
      color: var(--amarillo);
    }

    .chip-tipo-movimiento--egreso_gasto {
      background: var(--color-acento-suave);
      color: var(--color-acento-highlight);
    }

    .chip-tipo-movimiento--egreso_transferencia {
      background: var(--violeta-suave);
      color: var(--violeta);
    }

    .chip-tipo-movimiento--egreso_retiro {
      background: var(--bordo-suave);
      color: var(--bordo-oscuro);
    }

    .chip-tipo-movimiento--egreso_traspaso,
    .chip-tipo-movimiento--ingreso_traspaso {
      background: var(--color-superficie);
      color: var(--color-acento);
    }

    .movimiento__persona {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--color-texto);
      margin-bottom: 0.25rem;
    }

    .movimiento__contraparte {
      font-size: 0.8125rem;
      color: var(--color-texto-suave);
      margin-top: 0.125rem;
    }

    .movimiento__fecha {
      font-size: 0.8125rem;
      color: var(--color-texto-suave);
      margin-top: 0.375rem;
    }

    .movimiento__descripcion {
      font-size: 0.8125rem;
      color: var(--color-texto);
      margin-top: 0.25rem;
    }

    .movimiento__referencia {
      font-size: 0.75rem;
      color: var(--color-texto-suave);
      margin-top: 0.375rem;
    }

    .movimiento__referencia a { font-weight: 600; }

    .movimiento__monto {
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--color-texto);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Botones de medio de pago (2 opciones) ────────────────────────────── */

    .grilla-medio-pago-caja {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }

    .btn-tipo-doc {
      background: var(--color-fondo);
      border: 2px solid var(--color-borde);
      border-radius: 10px;
      padding: 0.625rem 0.25rem;
      font-family: var(--fuente);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--color-texto);
      cursor: pointer;
      text-align: center;
      line-height: 1.25;
      transition: border-color var(--transicion), background var(--transicion), color var(--transicion);
      -webkit-tap-highlight-color: transparent;
    }

    .btn-tipo-doc:hover {
      border-color: var(--amarillo);
      background: var(--amarillo-suave);
    }

    .btn-tipo-doc--seleccionado {
      border-color: var(--amarillo);
      background: var(--amarillo);
      color: #fff;
    }

    /* ── Modal: registrar ingreso / retiro (mismo patrón que modal-ficha) ─── */

    #modal-movimiento {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    #modal-movimiento[hidden] { display: none; }

    #modal-movimiento__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(17,17,17,0.45);
    }

    #modal-movimiento__panel {
      position: relative;
      background: var(--color-fondo);
      width: 100%;
      max-height: 92dvh;
      overflow-y: auto;
      border-radius: 20px 20px 0 0;
      padding: 1.25rem 1.25rem 1.5rem;
    }

    @media (min-width: 641px) {
      #modal-movimiento { align-items: center; }
      #modal-movimiento__panel {
        max-width: 440px;
        border-radius: 20px;
        box-shadow: var(--sombra-hover);
      }
    }

    .modal-movimiento__cerrar {
      position: absolute;
      top: 0.875rem;
      right: 0.875rem;
    }

    .aviso-retiro-personal {
      background: var(--bordo-suave);
      color: var(--bordo-oscuro);
      border-radius: 10px;
      padding: 0.625rem 0.875rem;
      font-size: 0.8125rem;
      margin: 0.75rem 0;
    }

    /* Ya se usaba en la etiqueta "Nota (opcional)" sin estar definida en
       este archivo (quedaba sin estilo) — la agrego acá, mismo criterio que
       ya existe en gastos.html, y de paso la reusan las cuentas nuevas. */
    .etiqueta-opcional {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--color-texto-suave);
      margin-left: 0.375rem;
    }

    .modal-movimiento__acciones {
      display: flex;
      gap: 0.625rem;
      margin-top: 1.25rem;
    }

    .modal-movimiento__acciones .btn { flex: 1; }

    /* ── Modal: traspaso entre medios (mismo patrón que #modal-movimiento) ── */

    #modal-traspaso {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    #modal-traspaso[hidden] { display: none; }

    #modal-traspaso__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(17,17,17,0.45);
    }

    #modal-traspaso__panel {
      position: relative;
      background: var(--color-fondo);
      width: 100%;
      max-height: 92dvh;
      overflow-y: auto;
      border-radius: 20px 20px 0 0;
      padding: 1.25rem 1.25rem 1.5rem;
    }

    @media (min-width: 641px) {
      #modal-traspaso { align-items: center; }
      #modal-traspaso__panel {
        max-width: 440px;
        border-radius: 20px;
        box-shadow: var(--sombra-hover);
      }
    }

    /* ── Modal: rechazar solicitud (mismo patrón que #modal-movimiento) ───── */

    #modal-rechazo {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    #modal-rechazo[hidden] { display: none; }

    #modal-rechazo__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(17,17,17,0.45);
    }

    #modal-rechazo__panel {
      position: relative;
      background: var(--color-fondo);
      width: 100%;
      max-height: 92dvh;
      overflow-y: auto;
      border-radius: 20px 20px 0 0;
      padding: 1.25rem 1.25rem 1.5rem;
    }

    @media (min-width: 641px) {
      #modal-rechazo { align-items: center; }
      #modal-rechazo__panel {
        max-width: 440px;
        border-radius: 20px;
        box-shadow: var(--sombra-hover);
      }
    }

    /* ── Solicitudes de movimiento pendientes (ficha de una persona) ───────── */

    .tarjeta-solicitud {
      border: 1px solid var(--color-borde);
      border-radius: 12px;
      padding: 0.875rem 1rem;
      margin-bottom: 0.625rem;
    }

    .tarjeta-solicitud__monto {
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-texto);
    }

    .tarjeta-solicitud__detalle {
      font-size: 0.8125rem;
      color: var(--color-texto-suave);
      margin-top: 0.25rem;
    }

    .tarjeta-solicitud__espera {
      font-size: 0.8125rem;
      color: var(--color-texto-suave);
      margin-top: 0.75rem;
      font-style: italic;
    }

    .tarjeta-solicitud__acciones {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .tarjeta-solicitud__acciones .btn { flex: 1; }

    /* ── Modal: nueva cuenta (mismo patrón que #modal-movimiento) ─────────── */

    #modal-cuenta-nueva {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    #modal-cuenta-nueva[hidden] { display: none; }

    #modal-cuenta-nueva__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(17,17,17,0.45);
    }

    #modal-cuenta-nueva__panel {
      position: relative;
      background: var(--color-fondo);
      width: 100%;
      max-height: 92dvh;
      overflow-y: auto;
      border-radius: 20px 20px 0 0;
      padding: 1.25rem 1.25rem 1.5rem;
    }

    @media (min-width: 641px) {
      #modal-cuenta-nueva { align-items: center; }
      #modal-cuenta-nueva__panel {
        max-width: 440px;
        border-radius: 20px;
        box-shadow: var(--sombra-hover);
      }
    }

    /* ── Gestión de cuentas propias (ficha propia) ─────────────────────────── */

    .grupo-cuentas { margin-bottom: 1rem; }

    .grupo-cuentas__titulo {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--color-texto-suave);
      margin-bottom: 0.5rem;
    }

    .tarjeta-cuenta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      border: 1px solid var(--color-borde);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
    }

    .tarjeta-cuenta__nombre {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--color-texto);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .tarjeta-cuenta__saldo {
      font-size: 0.8125rem;
      color: var(--color-texto-suave);
      margin-top: 0.125rem;
    }

    .tarjeta-cuenta__acciones {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .tarjeta-cuenta__acciones .btn {
      width: auto;
      padding: 0.375rem 0.75rem;
      font-size: 0.75rem;
    }

    .chip-favorita {
      display: inline-flex;
      align-items: center;
      padding: 0.0625rem 0.5rem;
      border-radius: 999px;
      background: var(--amarillo-suave);
      color: var(--amarillo-oscuro);
      font-size: 0.6875rem;
      font-weight: 700;
    }
  </style>
</head>
<body class="pagina-modulo">

  <!-- ═══════════════════════════════════════════════════════════════════════
       VISTA A — LISTADO GENERAL (solo admin/super_admin)
  ══════════════════════════════════════════════════════════════════════════ -->
  <div id="vista-lista-caja" hidden>

    <header style="position:sticky; top:0; z-index:20; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); background:rgba(255,255,255,0.72); border-bottom:1px solid var(--color-borde); display:flex; align-items:center; justify-content:space-between; padding:0.875rem 1.25rem;">
      <div>
        <div style="display:flex; align-items:center; gap:0.5rem;">
          <img src="../logo.png" alt="" style="width:20px; height:20px; object-fit:contain;">
          <span style="font-size:0.6875rem; font-weight:700; letter-spacing:0.08em; color:var(--color-texto-suave); text-transform:uppercase;">Seis Destinos</span>
        </div>
        <div style="font-size:1.375rem; font-weight:700; letter-spacing:-0.02em; color:var(--color-texto); display:flex; align-items:center; gap:0.375rem;">
          Caja <span style="color:var(--amarillo); font-size:1rem; line-height:1;">●</span>
        </div>
      </div>
      <a href="../dashboard.html" class="btn btn--icono" title="Volver al dashboard">‹ Volver</a>
    </header>

    <div class="vista-lista__contenedor" style="max-width: 960px; margin: 0 auto; padding: 0 1.25rem 3rem;">

      <div id="stat-total-empresa"></div>

      <div class="caja-toolbar">
        <div class="caja-toolbar__buscar">
          <input type="text" id="filtro-busqueda-caja" placeholder="🔍 Buscar persona…">
        </div>
        <button type="button" class="btn btn--navy-outline" id="btn-mi-caja" style="display:none; width:auto;">Mi caja</button>
        <div class="caja-toolbar__acciones">
          <button type="button" class="btn btn--bordo-outline" id="btn-retiro-personal-listado" style="width:auto; flex:1;">Retiro personal</button>
          <button type="button" class="btn btn--navy-outline" id="btn-ver-retiros-personales" style="display:none; width:auto; flex:1;">Retiros personales</button>
        </div>
      </div>

      <div id="lista-personas"></div>

      <div id="estado-cargando" class="estado-vacio">
        <div class="spinner"></div>
        <p class="estado-vacio__descripcion">Cargando…</p>
      </div>

      <div id="estado-vacio-caja" class="estado-vacio" hidden>

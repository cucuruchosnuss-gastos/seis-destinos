<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caja — Seis Destinos</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#1a2a52">

  <style>
    body {
      overflow-x: hidden;
      --amarillo:        #C99A2E;
      --amarillo-suave:  #FBF3E0;
      --amarillo-oscuro: #8C6A1A;
      --bordo:           #7A2E42;
      --bordo-suave:     #F5E8EC;
      --bordo-oscuro:    #5C2233;
    }

    /* ── Toolbar: buscador + filtro empresa + acciones ────────────────────── */

    .caja-toolbar {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .caja-toolbar__buscar { flex: 1; min-width: 160px; }

    #filtro-busqueda-caja {
      width: 100%;
      height: 38px;
      padding: 0 0.875rem;
      border: 1.5px solid var(--color-borde);
      border-radius: 999px;
      font-family: var(--fuente);
      font-size: 0.8125rem;
      background: var(--color-fondo);
      color: var(--color-texto);
      outline: none;
    }

    #filtro-busqueda-caja:focus { border-color: var(--amarillo); }

    .caja-toolbar__acciones {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
      width: 100%;
    }

    @media (min-width: 560px) {
      .caja-toolbar__acciones { width: auto; }
    }

    .btn--amarillo {
      background: var(--amarillo);
      color: #fff;
      border: 1.5px solid var(--amarillo);
    }
    .btn--amarillo:hover { background: var(--amarillo-oscuro); border-color: var(--amarillo-oscuro); }

    .btn--bordo-outline {
      background: var(--color-fondo);
      color: var(--bordo);
      border: 1.5px solid var(--bordo);
    }
    .btn--bordo-outline:hover { background: var(--bordo-suave); }

    .btn--navy-outline {
      background: var(--color-fondo);
      color: var(--color-acento);
      border: 1.5px solid var(--color-acento);
    }
    .btn--navy-outline:hover { background: var(--color-superficie); }

    /* ── Card total de la empresa ──────────────────────────────────────────── */

    .stat-card-caja {
      background: linear-gradient(135deg, var(--amarillo), var(--amarillo-oscuro));
      color: #fff;
      border-radius: 18px;
      padding: 1.125rem 1.25rem;
      box-shadow: 0 8px 24px rgba(140,106,26,0.25);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin: 1.25rem 0;
    }

    .stat-card-caja__label {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .stat-card-caja__montos {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 1rem;
      margin-top: 0.25rem;
    }

    .stat-card-caja__monto {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* Desglose por medio de pago — un chip por medio, fondo oscuro semi-
       transparente sobre el degradado ámbar para que se lea con contraste sin
       salirse del sistema de colores (sin jerarquía frente al total: chips
       chicos, separados del monto principal). Se usa tanto en la card del
       listado como en la ficha de persona. */
    .desglose-medio-pago {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      margin-top: 0.625rem;
    }

    .desglose-medio-pago__chip {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.625rem;
      border-radius: 999px;
      background: rgba(0,0,0,0.18);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .stat-card-caja__submetrics { display: flex; gap: 0.5rem; flex-shrink: 0; }

    .stat-card-caja__submetric {
      background: rgba(255,255,255,0.16);
      border-radius: 12px;
      padding: 0.5rem 0.875rem;
      text-align: center;
    }

    .stat-card-caja__submetric-label {
      font-size: 0.5625rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.85;
    }

    .stat-card-caja__submetric-valor { font-size: 1.125rem; font-weight: 700; margin-top: 0.125rem; }

    /* Chip para valores negativos sobre fondo ámbar (única excepción de color: bordó) */
    .valor-negativo-chip {
      display: inline-flex;
      background: rgba(255,255,255,0.92);
      color: var(--bordo);
      padding: 0.0625rem 0.5rem;
      border-radius: 8px;
    }

    /* ── Grupos por unidad de negocio ──────────────────────────────────────── */

    .grupo-personas { margin-bottom: 1.5rem; }

    .grupo-personas__titulo {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.5rem;
      font-size: 0.8125rem;
      font-weight: 700;
      color: var(--color-texto-suave);
      margin-bottom: 0.5rem;
    }

    .grupo-personas__nombre { display: flex; align-items: center; gap: 0.375rem; }

    .grupo-personas__punto {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--amarillo);
      flex-shrink: 0;
    }

    .grupo-personas__subtotales { display: flex; gap: 0.5rem; font-weight: 600; color: var(--color-texto); }

    .grupo-personas__subtotal--negativo { color: var(--bordo); }

    .lista-personas {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    /* Ajuste local sobre la card compartida: iniciales en blanco. */
    .tarjeta-lista__avatar { color: #fff; }

    .persona__monedas {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      margin-top: 0.375rem;
    }

    .chip-moneda {
      display: inline-flex;
      align-items: center;
      padding: 0.1875rem 0.5rem;
      border-radius: 999px;
      background: var(--amarillo-suave);
      color: var(--amarillo-oscuro);
      font-size: 0.6875rem;
      font-weight: 700;
    }

    .chip-moneda--negativo {
      background: var(--bordo-suave);
      color: var(--bordo);
    }

    .persona__saldo {
      font-size: 1.0625rem;
      font-weight: 700;
      color: var(--color-acento);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .persona__saldo--negativo { color: var(--bordo); }

    /* ── Vista detalle de persona ─────────────────────────────────────────── */

    #vista-detalle-persona:not([hidden]) {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: var(--color-superficie);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .saldos-grilla {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.75rem;
    }

    .saldo-card {
      background: linear-gradient(135deg, var(--amarillo), var(--amarillo-oscuro));
      color: #fff;
      border-radius: 18px;
      padding: 1.125rem 1.25rem;
      box-shadow: 0 8px 24px rgba(140,106,26,0.25);
    }

    .saldo-card__label {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .saldo-card__valor {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-top: 0.25rem;
    }

    /* ── Movimientos ───────────────────────────────────────────────────────── */

    .lista-movimientos {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .tarjeta-movimiento {
      background: var(--color-fondo);
      border: 1px solid var(--color-borde);
      border-radius: 12px;
      padding: 0.75rem 1rem;
    }

    .movimiento__cabecera {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .movimiento__info { flex: 1; min-width: 0; }

    .chip-tipo-movimiento {
      display: inline-flex;
      align-items: center;
      padding: 0.1875rem 0.625rem;
      border-radius: 999px;
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    /* Un color por tipo de movimiento — bordó sigue siendo el único color de
       alerta (solo retiro), el resto son identificadores neutros, no avisos. */
    .chip-tipo-movimiento--ingreso,
    .chip-tipo-movimiento--ingreso_externo {
      background: var(--amarillo-suave);
      color: var(--amarillo);
    }

    .chip-tipo-movimiento--egreso_gasto {
      background: var(--color-acento-suave);
      color: var(--color-acento-highlight);
    }

    .chip-tipo-movimiento--egreso_transferencia {
      background: var(--violeta-suave);
      color: var(--violeta);
    }

    .chip-tipo-movimiento--egreso_retiro {
      background: var(--bordo-suave);
      color: var(--bordo-oscuro);
    }

    .chip-tipo-movimiento--egreso_traspaso,
    .chip-tipo-movimiento--ingreso_traspaso {
      background: var(--color-superficie);
      color: var(--color-acento);
    }

    .movimiento__persona {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--color-texto);
      margin-bottom: 0.25rem;
    }

    .movimiento__contraparte {
      font-size: 0.8125rem;
      color: var(--color-texto-suave);
      margin-top: 0.125rem;
    }

    .movimiento__fecha {
      font-size: 0.8125rem;
      color: var(--color-texto-suave);
      margin-top: 0.375rem;
    }

    .movimiento__descripcion {
      font-size: 0.8125rem;
      color: var(--color-texto);
      margin-top: 0.25rem;
    }

    .movimiento__referencia {
      font-size: 0.75rem;
      color: var(--color-texto-suave);
      margin-top: 0.375rem;
    }

    .movimiento__referencia a { font-weight: 600; }

    .movimiento__monto {
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--color-texto);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Botones de medio de pago (2 opciones) ────────────────────────────── */

    .grilla-medio-pago-caja {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }

    .btn-tipo-doc {
      background: var(--color-fondo);
      border: 2px solid var(--color-borde);
      border-radius: 10px;
      padding: 0.625rem 0.25rem;
      font-family: var(--fuente);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--color-texto);
      cursor: pointer;
      text-align: center;
      line-height: 1.25;
      transition: border-color var(--transicion), background var(--transicion), color var(--transicion);
      -webkit-tap-highlight-color: transparent;
    }

    .btn-tipo-doc:hover {
      border-color: var(--amarillo);
      background: var(--amarillo-suave);
    }

    .btn-tipo-doc--seleccionado {
      border-color: var(--amarillo);
      background: var(--amarillo);
      color: #fff;
    }

    /* ── Modal: registrar ingreso / retiro (mismo patrón que modal-ficha) ─── */

    #modal-movimiento {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    #modal-movimiento[hidden] { display: none; }

    #modal-movimiento__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(17,17,17,0.45);
    }

    #modal-movimiento__panel {
      position: relative;
      background: var(--color-fondo);
      width: 100%;
      max-height: 92dvh;
      overflow-y: auto;
      border-radius: 20px 20px 0 0;
      padding: 1.25rem 1.25rem 1.5rem;
    }

    @media (min-width: 641px) {
      #modal-movimiento { align-items: center; }
      #modal-movimiento__panel {
        max-width: 440px;
        border-radius: 20px;
        box-shadow: var(--sombra-hover);
      }
    }

    .modal-movimiento__cerrar {
      position: absolute;
      top: 0.875rem;
      right: 0.875rem;
    }

    .aviso-retiro-personal {
      background: var(--bordo-suave);
      color: var(--bordo-oscuro);
      border-radius: 10px;
      padding: 0.625rem 0.875rem;
      font-size: 0.8125rem;
      margin: 0.75rem 0;
    }

    /* Texto fijo (no editable) para "¿Quién te dio la plata?" cuando la
       contraparte ya está determinada — mismo look que un input deshabilitado. */
    .campo-texto-fijo {
      padding: 0.6875rem 0.875rem;
      border: 1.5px solid var(--color-borde);
      border-radius: var(--radio-input);
      background: var(--color-superficie);
      font-family: var(--fuente);
      font-size: 0.9375rem;
      color: var(--color-texto);
    }

    .modal-movimiento__acciones {
      display: flex;
      gap: 0.625rem;
      margin-top: 1.25rem;
    }

    .modal-movimiento__acciones .btn { flex: 1; }

    /* ── Modal: traspaso entre medios (mismo patrón que #modal-movimiento) ── */

    #modal-traspaso {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    #modal-traspaso[hidden] { display: none; }

    #modal-traspaso__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(17,17,17,0.45);
    }

    #modal-traspaso__panel {
      position: relative;
      background: var(--color-fondo);
      width: 100%;
      max-height: 92dvh;
      overflow-y: auto;
      border-radius: 20px 20px 0 0;
      padding: 1.25rem 1.25rem 1.5rem;
    }

    @media (min-width: 641px) {
      #modal-traspaso { align-items: center; }
      #modal-traspaso__panel {
        max-width: 440px;
        border-radius: 20px;
        box-shadow: var(--sombra-hover);
      }
    }
  </style>
</head>
<body class="pagina-modulo">

  <!-- ═══════════════════════════════════════════════════════════════════════
       VISTA A — LISTADO GENERAL (solo admin/super_admin)
  ══════════════════════════════════════════════════════════════════════════ -->
  <div id="vista-lista-caja" hidden>

    <header style="position:sticky; top:0; z-index:20; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); background:rgba(255,255,255,0.72); border-bottom:1px solid var(--color-borde); display:flex; align-items:center; justify-content:space-between; padding:0.875rem 1.25rem;">
      <div>
        <div style="display:flex; align-items:center; gap:0.5rem;">
          <img src="../logo.png" alt="" style="width:20px; height:20px; object-fit:contain;">
          <span style="font-size:0.6875rem; font-weight:700; letter-spacing:0.08em; color:var(--color-texto-suave); text-transform:uppercase;">Seis Destinos</span>
        </div>
        <div style="font-size:1.375rem; font-weight:700; letter-spacing:-0.02em; color:var(--color-texto); display:flex; align-items:center; gap:0.375rem;">
          Caja <span style="color:var(--amarillo); font-size:1rem; line-height:1;">●</span>
        </div>
      </div>
      <a href="../dashboard.html" class="btn btn--icono" title="Volver al dashboard">‹ Volver</a>
    </header>

    <div class="vista-lista__contenedor" style="max-width: 960px; margin: 0 auto; padding: 0 1.25rem 3rem;">

      <div id="stat-total-empresa"></div>

      <div class="caja-toolbar">
        <div class="caja-toolbar__buscar">
          <input type="text" id="filtro-busqueda-caja" placeholder="🔍 Buscar persona…">
        </div>
        <button type="button" class="btn btn--navy-outline" id="btn-mi-caja" style="display:none; width:auto;">Mi caja</button>
        <div class="caja-toolbar__acciones">
          <button type="button" class="btn btn--bordo-outline" id="btn-retiro-personal-listado" style="width:auto; flex:1;">Retiro personal</button>
          <button type="button" class="btn btn--navy-outline" id="btn-ver-retiros-personales" style="display:none; width:auto; flex:1;">Retiros personales</button>
        </div>
      </div>

      <div id="lista-personas"></div>

      <div id="estado-cargando" class="estado-vacio">
        <div class="spinner"></div>
        <p class="estado-vacio__descripcion">Cargando…</p>
      </div>

      <div id="estado-vacio-caja" class="estado-vacio" hidden>
        <div class="estado-vacio__icono">💰</div>
        <div class="estado-vacio__titulo">No hay personas con caja disponible</div>
      </div>

    </div>

  </div><!-- /vista-lista-caja -->


  <!-- ═══════════════════════════════════════════════════════════════════════
       VISTA — RETIROS PERSONALES (exclusiva rol_app === 'super_admin')
  ══════════════════════════════════════════════════════════════════════════ -->
  <div id="vista-retiros-personales" hidden>
    <header class="header">
      <button type="button" class="btn btn--icono" id="btn-cerrar-retiros-personales">← Volver</button>
      <span class="header__nombre-app">Retiros personales</span>
      <div style="width:2rem;"></div>
    </header>

    <div style="padding:1.25rem; max-width:720px; margin:0 auto; width:100%;">
      <div id="estado-cargando-retiros" class="estado-vacio">
        <div class="spinner"></div>
        <p class="estado-vacio__descripcion">Cargando…</p>
      </div>

      <div class="lista-movimientos" id="lista-retiros-personales"></div>

      <div id="estado-vacio-retiros" class="estado-vacio" hidden>
        <div class="estado-vacio__icono">📋</div>
        <div class="estado-vacio__titulo">No hay retiros registrados</div>
      </div>
    </div>
  </div><!-- /vista-retiros-personales -->


  <!-- ═══════════════════════════════════════════════════════════════════════
       VISTA B — FICHA DE PERSONA
  ══════════════════════════════════════════════════════════════════════════ -->
  <div id="vista-detalle-persona" hidden>
    <header class="header">
      <button type="button" class="btn btn--icono" id="btn-volver-ficha">← Volver</button>
      <span class="header__nombre-app" id="detalle-persona-nombre"></span>
      <div style="width:2rem;"></div>
    </header>

    <div style="padding:1.25rem; max-width:720px; margin:0 auto; width:100%;">
      <div id="detalle-persona-saldos"></div>

      <div id="detalle-persona-acciones" style="display:flex; gap:0.625rem; margin:1.25rem 0 1.5rem;"></div>

      <div class="modal-ficha__seccion-titulo">Movimientos</div>

      <div id="estado-cargando-movimientos" class="estado-vacio" hidden>
        <div class="spinner"></div>
        <p class="estado-vacio__descripcion">Cargando movimientos…</p>
      </div>

      <div class="lista-movimientos" id="detalle-persona-movimientos"></div>

      <div id="detalle-persona-vacio" class="estado-vacio" hidden>
        <div class="estado-vacio__icono">📋</div>
        <div class="estado-vacio__titulo">Sin movimientos registrados</div>
      </div>
    </div>
  </div><!-- /vista-detalle-persona -->


  <!-- Modal: Registrar ingreso / retiro -->
  <div id="modal-movimiento" hidden>
    <div id="modal-movimiento__backdrop"></div>
    <div id="modal-movimiento__panel">
      <button type="button" class="btn btn--icono modal-movimiento__cerrar" id="btn-cerrar-movimiento" title="Cerrar">✕</button>
      <h2 id="movimiento-titulo">Registrar ingreso</h2>

      <div id="aviso-retiro-personal" class="aviso-retiro-personal" hidden></div>

      <div class="formulario" style="margin-top:1rem;">
        <div class="grupo-campo" id="grupo-contraparte" style="display:none;">
          <label for="contraparte-select">¿Quién te dio la plata?</label>
          <select id="contraparte-select">
            <option value="">— Seleccioná —</option>
          </select>
          <div id="contraparte-fija" class="campo-texto-fijo" hidden></div>
        </div>

        <div style="display:grid; grid-template-columns:1fr auto; gap:0.75rem; align-items:end;">
          <div class="grupo-campo">
            <label for="movimiento-monto">Monto</label>
            <input type="text" inputmode="decimal" id="movimiento-monto" placeholder="0,00">
          </div>
          <div class="grupo-campo">
            <label for="movimiento-moneda">Moneda</label>
            <select id="movimiento-moneda" style="width:5.5rem;">
              <option value="ARS">ARS</option>
              <option value="USD">USD</option>
            </select>
          </div>
        </div>

        <div class="grupo-campo">
          <label for="movimiento-fecha">Fecha</label>
          <input type="date" id="movimiento-fecha" name="fecha">
        </div>

        <div class="grupo-campo">
          <label>Medio de pago</label>
          <div class="grilla-medio-pago-caja" id="grilla-medio-pago-caja">
            <button type="button" class="btn-tipo-doc" data-valor="efectivo">Efectivo</button>
            <button type="button" class="btn-tipo-doc" data-valor="transferencia">Banco</button>
          </div>
        </div>

        <div class="grupo-campo">
          <label for="movimiento-descripcion">Nota <span class="etiqueta-opcional">opcional</span></label>
          <input type="text" id="movimiento-descripcion" placeholder="Ej: Adelanto de sueldo">
        </div>
      </div>

      <div class="modal-movimiento__acciones">
        <button type="button" class="btn btn--secundario" id="btn-cancelar-movimiento">Cancelar</button>
        <button type="button" class="btn btn--exito" id="btn-guardar-movimiento">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Traspaso entre medios (efectivo ⇄ banco), dentro de la propia caja -->
  <div id="modal-traspaso" hidden>
    <div id="modal-traspaso__backdrop"></div>
    <div id="modal-traspaso__panel">
      <button type="button" class="btn btn--icono modal-movimiento__cerrar" id="btn-cerrar-traspaso" title="Cerrar">✕</button>
      <h2>Traspaso entre medios</h2>

      <div class="formulario" style="margin-top:1rem;">
        <div style="display:grid; grid-template-columns:1fr auto; gap:0.75rem; align-items:end;">
          <div class="grupo-campo">
            <label for="traspaso-monto">Monto</label>
            <input type="text" inputmode="decimal" id="traspaso-monto" placeholder="0,00">
          </div>
          <div class="grupo-campo">
            <label for="traspaso-moneda">Moneda</label>
            <select id="traspaso-moneda" style="width:5.5rem;">
              <option value="ARS">ARS</option>
              <option value="USD">USD</option>
            </select>
          </div>
        </div>

        <div class="grupo-campo">
          <label for="traspaso-fecha">Fecha</label>
          <input type="date" id="traspaso-fecha" name="fecha">
        </div>

        <div class="grupo-campo">
          <label>Dirección</label>
          <div class="grilla-medio-pago-caja" id="grilla-direccion-traspaso">
            <button type="button" class="btn-tipo-doc" data-valor="efectivo_a_banco">Efectivo → Banco</button>
            <button type="button" class="btn-tipo-doc" data-valor="banco_a_efectivo">Banco → Efectivo</button>
          </div>
        </div>
      </div>

      <div class="modal-movimiento__acciones">
        <button type="button" class="btn btn--secundario" id="btn-cancelar-traspaso">Cancelar</button>
        <button type="button" class="btn btn--exito" id="btn-guardar-traspaso">Guardar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { verificarSesion } from '../js/auth.js'
    import { mostrarError, mostrarExito, formatearFecha } from '../js/utils.js'
    import { supabase } from '../js/supabase.js'
    import { mostrarBannerVersion } from '../js/version-banner.js'

    mostrarBannerVersion()

    // ═══════════════════════════════════════════════════════════════════════
    // ESTADO GLOBAL
    // ═══════════════════════════════════════════════════════════════════════

    const estado = {
      sesion:          null,
      miEmpleado:      null, // { id, nombre, rol_app, caja_raiz }
      empleados:       [],   // personas con acceso (solo se carga para admin/super_admin)
      maestros:        { unidadesNegocio: [] },
      saldos:          [],   // filas de v_caja_saldos — para admin: de todos los visibles;
                              // para usuario: solo las propias (nunca se piden las de otros)
      saldosPorMedio:  [],   // filas de v_caja_saldos_medio — mismo alcance que saldos
      superAdmins:     [],   // { id, nombre, caja_raiz } — todos los rol_app='super_admin'
      nombresEmpleados: {},  // id -> nombre (todos los activos), para resolver contraparte/
                              // titular sin depender de embeds ambiguos (caja_movimientos
                              // tiene 3 FKs a empleados: empleado_id, contraparte_empleado_id,
                              // creado_por — un embed "empleados(nombre)" sería ambiguo)
      movimientosDelMes: 0,
      personaAbierta:  null, // id de empleado cuya ficha está abierta
      origenFicha:     null, // 'listado' (la abrió un admin) | 'directo' (entró un usuario)
      movimientos:     [],
      filtros:         { busqueda: '' },
      wizardMovimiento: { tipo: null, empleadoId: null },
    }

    let medioPagoCajaSeleccionado = null

    // egreso_transferencia no tiene etiqueta fija — se arma dinámico con el
    // nombre de la contraparte ("Entregado a X"), ver etiquetaMovimiento().
    const TIPO_LABEL = { ingreso: 'Ingreso', ingreso_externo: 'Ingreso externo', egreso_gasto: 'Gasto', egreso_retiro: 'Retiro' }
    const MEDIO_PAGO_LABEL_CAJA = { efectivo: 'Efectivo', transferencia: 'Banco' }

    function esAdmin() {
      return ['admin', 'super_admin'].includes(estado.miEmpleado?.rol_app)
    }

    // ═══════════════════════════════════════════════════════════════════════
    // HELPERS
    // ═══════════════════════════════════════════════════════════════════════

    function iniciales(nombre) {
      const palabras = (nombre || '').trim().split(/\s+/).filter(Boolean)
      if (!palabras.length) return '—'
      if (palabras.length === 1) return palabras[0].slice(0, 2).toUpperCase()
      return (palabras[0][0] + palabras[1][0]).toUpperCase()
    }

    const PALETA_AVATAR = ['#C99A2E', '#8C6A1A', '#D9B45C', '#4A5568', '#7A2E42']
    function colorAvatar(texto) {
      let hash = 0
      for (let i = 0; i < (texto || '').length; i++) hash = texto.charCodeAt(i) + ((hash << 5) - hash)
      return PALETA_AVATAR[Math.abs(hash) % PALETA_AVATAR.length]
    }

    function formatearImporte(importe, moneda = 'ARS') {
      if (importe == null) return '—'
      const num = Number(importe).toLocaleString('es-AR', {
        minimumFractionDigits: 2, maximumFractionDigits: 2,
      })
      return moneda === 'USD' ? `USD ${num}` : `$ ${num}`
    }

    // Envuelve el valor en el chip claro cuando es negativo — única excepción
    // de color permitida (bordó) para textos sobre fondo ámbar.
    function formatearImporteConAlerta(importe, moneda) {
      const texto = formatearImporte(importe, moneda)
      return Number(importe) < 0 ? `<span class="valor-negativo-chip">${texto}</span>` : texto
    }

    // Convierte "1.349.799,77" → 1349799.77
    function parseImporte(str) {
      if (!str) return null
      const limpio = String(str).replace(/\./g, '').replace(',', '.')
      const num    = parseFloat(limpio)
      return isNaN(num) ? null : num
    }

    function fechaISO(d) {
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0')
    }

    function saldosDe(empleadoId) {
      return estado.saldos.filter(s => s.empleado_id === empleadoId)
    }

    function saldosPorMedioDe(empleadoId) {
      return estado.saldosPorMedio.filter(s => s.empleado_id === empleadoId)
    }

    // Arma "Efectivo: $X · Transferencia: $Y" para UNA moneda puntual, sumando
    // las filas de v_caja_saldos_medio que correspondan (de toda la empresa o
    // de una sola persona, según lo que le pase el caller ya filtrado). Si un
    // medio no tiene fila para esa moneda, directamente no aparece — nada en
    // cero. Devuelve '' si no hay ninguna fila para esa moneda.
    function renderizarDesglosePorMedio(filas, moneda) {
      const porMedio = {}
      filas.filter(f => f.moneda === moneda).forEach(f => {
        porMedio[f.medio_pago] = (porMedio[f.medio_pago] || 0) + Number(f.saldo)
      })
      const entradas = Object.entries(porMedio)
      if (!entradas.length) return ''

      const chips = entradas
        .map(([medio, saldo]) => `<span class="desglose-medio-pago__chip">${MEDIO_PAGO_LABEL_CAJA[medio] || medio}: ${formatearImporte(saldo, moneda)}</span>`)
        .join('')
      return `<div class="desglose-medio-pago">${chips}</div>`
    }

    function nombreEmpresa(unidadId) {
      return estado.maestros.unidadesNegocio.find(u => u.id === unidadId)?.nombre || null
    }

    // Devuelve el registro completo (rol_app, caja_raiz) del dueño de una
    // ficha, sea que esté en el listado (lo abrió un admin) o sea el propio
    // usuario logueado (entrada directa, nunca está en estado.empleados).
    function datosDePersona(empleadoId) {
      return estado.empleados.find(e => e.id === empleadoId) ||
        (estado.miEmpleado?.id === empleadoId ? estado.miEmpleado : null)
    }

    // Solo hay dos medios posibles — el "otro" es simplemente el que no es este.
    function otroMedioPago(medio) {
      return medio === 'efectivo' ? 'transferencia' : 'efectivo'
    }

    function etiquetaMovimiento(m) {
      if (m.tipo === 'egreso_transferencia') {
        return 'Entregado a ' + (estado.nombresEmpleados[m.contraparte_empleado_id] || '—')
      }
      if (m.tipo === 'egreso_traspaso') {
        return 'Traspaso a ' + MEDIO_PAGO_LABEL_CAJA[otroMedioPago(m.medio_pago)]
      }
      if (m.tipo === 'ingreso_traspaso') {
        return 'Traspaso desde ' + MEDIO_PAGO_LABEL_CAJA[otroMedioPago(m.medio_pago)]
      }
      return TIPO_LABEL[m.tipo] || m.tipo
    }

    // ═══════════════════════════════════════════════════════════════════════
    // CARGA DE DATOS — comunes a todos los roles
    // ═══════════════════════════════════════════════════════════════════════

    async function cargarSuperAdmins() {
      const { data, error } = await supabase.from('empleados').select('id, nombre, caja_raiz').eq('rol_app', 'super_admin')
      if (error) { mostrarError('No se pudieron cargar los super admins.'); return }
      estado.superAdmins = data || []
    }

    async function cargarNombresEmpleados() {
      const { data, error } = await supabase.from('empleados').select('id, nombre').eq('activo', true)
      if (error) { mostrarError('No se pudieron cargar los nombres de empleados.'); return }
      estado.nombresEmpleados = Object.fromEntries((data || []).map(e => [e.id, e.nombre]))
    }

    // ═══════════════════════════════════════════════════════════════════════
    // CARGA DE DATOS — Listado general (solo admin/super_admin)
    // ═══════════════════════════════════════════════════════════════════════

    async function cargarListado() {
      document.getElementById('estado-cargando').hidden = false

      const [empRes, unidRes] = await Promise.all([
        supabase.from('empleados').select('id, nombre, unidad_negocio_id, rol_app, caja_raiz').not('auth_user_id', 'is', null).eq('activo', true).order('nombre'),
        supabase.from('unidades_negocio').select('id, nombre').order('nombre'),
      ])

      if (empRes.error || unidRes.error) {
        document.getElementById('estado-cargando').hidden = true
        mostrarError('No se pudieron cargar las personas.')
        return
      }
      estado.empleados = empRes.data || []
      estado.maestros.unidadesNegocio = unidRes.data || []

      const ids = estado.empleados.map(e => e.id)

      const [saldosRes, saldosMedioRes, movRes] = await Promise.all([
        ids.length
          ? supabase.from('v_caja_saldos').select('empleado_id, moneda, saldo').in('empleado_id', ids)
          : Promise.resolve({ data: [], error: null }),
        ids.length
          ? supabase.from('v_caja_saldos_medio').select('empleado_id, moneda, medio_pago, saldo').in('empleado_id', ids)
          : Promise.resolve({ data: [], error: null }),
        ids.length
          ? supabase.from('caja_movimientos').select('id', { count: 'exact', head: true }).in('empleado_id', ids).gte('fecha', fechaISO(new Date(new Date().getFullYear(), new Date().getMonth(), 1)))
          : Promise.resolve({ count: 0, error: null }),
      ])

      document.getElementById('estado-cargando').hidden = true

      if (saldosRes.error || saldosMedioRes.error) {
        mostrarError('No se pudieron cargar los saldos.')
        return
      }
      estado.saldos = saldosRes.data || []
      estado.saldosPorMedio = saldosMedioRes.data || []
      estado.movimientosDelMes = movRes.count || 0

      renderizarStatTotal()
      renderizarListado()
    }

    // ═══════════════════════════════════════════════════════════════════════
    // RENDER — Card total de la empresa
    // ═══════════════════════════════════════════════════════════════════════

    function renderizarStatTotal() {
      const cont = document.getElementById('stat-total-empresa')

      const totalesPorMoneda = {}
      estado.saldos.forEach(s => { totalesPorMoneda[s.moneda] = (totalesPorMoneda[s.moneda] || 0) + Number(s.saldo) })
      const monedas = Object.keys(totalesPorMoneda)
      const empleadosConSaldo = new Set(estado.saldos.map(s => s.empleado_id)).size

      const montosHtml = monedas.length
        ? monedas.map(m => `<span class="stat-card-caja__monto">${formatearImporteConAlerta(totalesPorMoneda[m], m)}</span>`).join('')
        : `<span class="stat-card-caja__monto">${formatearImporte(0, 'ARS')}</span>`

      // Ya viene envuelto en .desglose-medio-pago (o '' si no hay filas) —
      // no hace falta un wrapper extra por moneda.
      const desgloseHtml = monedas
        .map(m => renderizarDesglosePorMedio(estado.saldosPorMedio, m))
        .join('')

      cont.innerHTML = `
        <div class="stat-card-caja">
          <div>
            <div class="stat-card-caja__label">Total de la empresa</div>
            <div class="stat-card-caja__montos">${montosHtml}</div>
            ${desgloseHtml}
          </div>
          <div class="stat-card-caja__submetrics">
            <div class="stat-card-caja__submetric">
              <div class="stat-card-caja__submetric-label">Con saldo</div>
              <div class="stat-card-caja__submetric-valor">${empleadosConSaldo}</div>
            </div>
            <div class="stat-card-caja__submetric">
              <div class="stat-card-caja__submetric-label">Mov. del mes</div>
              <div class="stat-card-caja__submetric-valor">${estado.movimientosDelMes}</div>
            </div>
          </div>
        </div>
      `
    }

    // ═══════════════════════════════════════════════════════════════════════
    // RENDER — Listado agrupado por unidad de negocio
    // ═══════════════════════════════════════════════════════════════════════

    function agruparPersonas() {
      const porUnidad = new Map()
      estado.maestros.unidadesNegocio.forEach(u => porUnidad.set(u.id, { id: u.id, nombre: u.nombre, lista: [] }))
      const sinEmpresa = []

      estado.empleados.forEach(emp => {
        if (emp.unidad_negocio_id && porUnidad.has(emp.unidad_negocio_id)) {
          porUnidad.get(emp.unidad_negocio_id).lista.push(emp)
        } else {
          sinEmpresa.push(emp)
        }
      })

      const grupos = [...porUnidad.values()].filter(g => g.lista.length)
      if (sinEmpresa.length) grupos.push({ id: null, nombre: 'Sin empresa asignada', lista: sinEmpresa })

      grupos.forEach(g => g.lista.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || '', 'es', { sensitivity: 'base' })))
      return grupos
    }

    function subtotalGrupo(lista) {
      const totales = {}
      lista.forEach(emp => {
        saldosDe(emp.id).forEach(s => { totales[s.moneda] = (totales[s.moneda] || 0) + Number(s.saldo) })
      })
      return totales
    }

    function renderizarTarjetaPersona(emp) {
      const saldos = saldosDe(emp.id)
      const principal = saldos.find(s => s.moneda === 'ARS') || saldos[0] || { moneda: 'ARS', saldo: 0 }
      const negativoPrincipal = Number(principal.saldo) < 0
      const empresa = nombreEmpresa(emp.unidad_negocio_id)

      const otrasMonedas = saldos.length > 1
        ? `<div class="persona__monedas">${saldos.map(s => `
            <span class="chip-moneda ${Number(s.saldo) < 0 ? 'chip-moneda--negativo' : ''}">${s.moneda} ${formatearImporte(s.saldo, s.moneda)}</span>
          `).join('')}</div>`
        : ''

      return `
        <div class="tarjeta-lista" data-id="${emp.id}">
          <div class="tarjeta-lista__avatar" style="background:${colorAvatar(emp.nombre)};">${iniciales(emp.nombre)}</div>
          <div class="tarjeta-lista__info">
            <div class="tarjeta-lista__titulo">${emp.nombre}</div>
            ${empresa ? `<div class="tarjeta-lista__subtitulo">${empresa}</div>` : ''}
            ${otrasMonedas}
          </div>
          <div class="persona__saldo ${negativoPrincipal ? 'persona__saldo--negativo' : ''}">${formatearImporte(principal.saldo, principal.moneda)}</div>
        </div>
      `
    }

    function renderizarListado() {
      const cont = document.getElementById('lista-personas')
      const termino = (estado.filtros.busqueda || '').trim().toLowerCase()

      // El buscador solo oculta filas/grupos — el agrupamiento y el orden ya
      // calculados en agruparPersonas() no se tocan.
      let grupos = agruparPersonas()
      grupos = grupos
        .map(g => ({ ...g, lista: termino ? g.lista.filter(e => (e.nombre || '').toLowerCase().includes(termino)) : g.lista }))
        .filter(g => g.lista.length)

      if (!grupos.length) {
        cont.innerHTML = ''
        document.getElementById('estado-vacio-caja').hidden = false
        return
      }
      document.getElementById('estado-vacio-caja').hidden = true

      cont.innerHTML = grupos.map(g => {
        const totales = subtotalGrupo(g.lista)
        const subtotalHtml = Object.entries(totales).map(([moneda, total]) => `
          <span class="${Number(total) < 0 ? 'grupo-personas__subtotal--negativo' : ''}">${formatearImporte(total, moneda)}</span>
        `).join('')

        return `
          <div class="grupo-personas">
            <div class="grupo-personas__titulo">
              <span class="grupo-personas__nombre"><span class="grupo-personas__punto"></span>${g.nombre} <span style="font-weight:500;">· ${g.lista.length}</span></span>
              <span class="grupo-personas__subtotales">${subtotalHtml}</span>
            </div>
            <div class="lista-personas">
              ${g.lista.map(renderizarTarjetaPersona).join('')}
            </div>
          </div>
        `
      }).join('')

      cont.querySelectorAll('.tarjeta-lista').forEach(el => {
        el.addEventListener('click', () => abrirDetallePersona(el.dataset.id, 'listado'))
      })
    }

    // ═══════════════════════════════════════════════════════════════════════
    // VISTA — Ficha de persona
    // ═══════════════════════════════════════════════════════════════════════

    async function abrirDetallePersona(empleadoId, origen) {
      const emp = origen === 'listado'
        ? estado.empleados.find(e => e.id === empleadoId)
        : estado.miEmpleado
      if (!emp) return

      estado.personaAbierta = empleadoId
      estado.origenFicha = origen
      document.getElementById('detalle-persona-nombre').textContent = emp.nombre

      document.getElementById('vista-lista-caja').hidden = true
      document.getElementById('vista-detalle-persona').removeAttribute('hidden')

      // Entrada directa (rol 'usuario'): nunca se cargó el listado general —
      // acá se piden únicamente los saldos propios, no los de nadie más.
      if (origen === 'directo') {
        const [saldosRes, saldosMedioRes] = await Promise.all([
          supabase.from('v_caja_saldos').select('empleado_id, moneda, saldo').eq('empleado_id', empleadoId),
          supabase.from('v_caja_saldos_medio').select('empleado_id, moneda, medio_pago, saldo').eq('empleado_id', empleadoId),
        ])
        if (saldosRes.error || saldosMedioRes.error) mostrarError('No se pudieron cargar los saldos.')
        estado.saldos = saldosRes.data || []
        estado.saldosPorMedio = saldosMedioRes.data || []
      }

      renderizarSaldosDetalle(empleadoId)
      renderizarAccionesDetalle(empleadoId)

      document.getElementById('detalle-persona-movimientos').innerHTML = ''
      document.getElementById('detalle-persona-vacio').hidden = true

      await cargarMovimientos(empleadoId)
    }

    function cerrarDetallePersona() {
      document.getElementById('vista-detalle-persona').hidden = true
      document.getElementById('vista-lista-caja').removeAttribute('hidden')
      estado.personaAbierta = null
    }

    function renderizarSaldosDetalle(empleadoId) {
      const saldos = saldosDe(empleadoId)
      const cont = document.getElementById('detalle-persona-saldos')
      const lista = saldos.length ? saldos : [{ moneda: 'ARS', saldo: 0 }]
      const porMedio = saldosPorMedioDe(empleadoId)

      cont.innerHTML = `<div class="saldos-grilla">${lista.map(s => {
        const desglose = renderizarDesglosePorMedio(porMedio, s.moneda)
        return `
        <div class="saldo-card">
          <div class="saldo-card__label">Saldo ${s.moneda}</div>
          <div class="saldo-card__valor">${formatearImporteConAlerta(s.saldo, s.moneda)}</div>
          ${desglose}
        </div>
      `}).join('')}</div>`
    }

    function renderizarAccionesDetalle(empleadoId) {
      const cont = document.getElementById('detalle-persona-acciones')
      const botones = []

      // "Añadir ingreso" va siempre, EXCEPTO en la ficha del caja_raiz (Pablo)
      // vista por otra persona: esa RPC (registrar_ingreso_externo_caja) no
      // tiene p_empleado_id, solo puede atribuirse al que la llama — si lo
      // dejáramos abierto, el ingreso quedaría cargado a nombre de quien no
      // es Pablo. Retiro personal, en cambio, sí soporta actuar por otro.
      const persona = datosDePersona(empleadoId)
      const esRaizAjena = !!persona?.caja_raiz && empleadoId !== estado.miEmpleado.id
      if (!esRaizAjena) {
        botones.push(`<button type="button" class="btn btn--amarillo" id="btn-detalle-ingreso" style="flex:1;">Añadir ingreso</button>`)
      }
      botones.push(`<button type="button" class="btn btn--bordo-outline" id="btn-detalle-retiro" style="flex:1;">Retiro personal</button>`)

      // Traspaso: mueve plata entre medios DENTRO de la propia caja. Solo
      // tiene sentido en la ficha propia (la RPC no acepta p_empleado_id,
      // siempre opera sobre quien la llama) — para cualquier rol_app.
      if (empleadoId === estado.miEmpleado.id) {
        botones.push(`<button type="button" class="btn btn--navy-outline" id="btn-detalle-traspaso" style="flex:1;">Traspaso</button>`)
      }

      cont.innerHTML = botones.join('')

      document.getElementById('btn-detalle-ingreso')?.addEventListener('click', () => abrirModalMovimiento('ingreso', empleadoId))
      document.getElementById('btn-detalle-retiro')?.addEventListener('click', () => abrirModalMovimiento('retiro', empleadoId))
      document.getElementById('btn-detalle-traspaso')?.addEventListener('click', () => abrirModalTraspaso())
    }

    document.getElementById('btn-volver-ficha').addEventListener('click', () => {
      if (estado.origenFicha === 'listado') {
        cerrarDetallePersona()
      } else {
        window.location.href = '../dashboard.html'
      }
    })

    // ═══════════════════════════════════════════════════════════════════════
    // CARGA + RENDER — Movimientos
    // ═══════════════════════════════════════════════════════════════════════

    async function cargarMovimientos(empleadoId) {
      document.getElementById('estado-cargando-movimientos').hidden = false

      const { data, error } = await supabase
        .from('caja_movimientos')
        .select(`
          id, tipo, monto, moneda, medio_pago, descripcion, fecha, gasto_id, contraparte_empleado_id,
          gastos ( razon_social, categorias ( nombre ) )
        `)
        .eq('empleado_id', empleadoId)
        .order('fecha', { ascending: false })
        .order('created_at', { ascending: false })

      document.getElementById('estado-cargando-movimientos').hidden = true

      if (error) {
        mostrarError('No se pudieron cargar los movimientos.')
        return
      }
      estado.movimientos = data || []
      renderizarMovimientos()
    }

    function renderizarFilaMovimiento(m, { mostrarPersona = false } = {}) {
      const esPositivo = m.tipo === 'ingreso' || m.tipo === 'ingreso_externo' || m.tipo === 'ingreso_traspaso'
      const signo = esPositivo ? '+' : '−'

      const personaHtml = mostrarPersona
        ? `<div class="movimiento__persona">${estado.nombresEmpleados[m.empleado_id] || '—'}</div>`
        : ''

      const sublineaContraparte = (m.tipo === 'ingreso' && m.contraparte_empleado_id)
        ? `<div class="movimiento__contraparte">de ${estado.nombresEmpleados[m.contraparte_empleado_id] || '—'}</div>`
        : ''

      const refGasto = (m.gasto_id && m.gastos)
        ? `<div class="movimiento__referencia">${m.gastos.razon_social || 'Gasto'}${m.gastos.categorias?.nombre ? ' · ' + m.gastos.categorias.nombre : ''} — <a href="gastos.html?gasto=${m.gasto_id}">Ver gasto →</a></div>`
        : ''

      return `
        <div class="tarjeta-movimiento">
          <div class="movimiento__cabecera">
            <div class="movimiento__info">
              ${personaHtml}
              <span class="chip-tipo-movimiento chip-tipo-movimiento--${m.tipo}">${etiquetaMovimiento(m)}</span>
              ${sublineaContraparte}
              <div class="movimiento__fecha">${formatearFecha(m.fecha)} · ${MEDIO_PAGO_LABEL_CAJA[m.medio_pago] || m.medio_pago}</div>
              ${m.descripcion ? `<div class="movimiento__descripcion">${m.descripcion}</div>` : ''}
              ${refGasto}
            </div>
            <div class="movimiento__monto">${signo} ${formatearImporte(m.monto, m.moneda)}</div>
          </div>
        </div>
      `
    }

    function renderizarMovimientos() {
      const cont = document.getElementById('detalle-persona-movimientos')

      if (!estado.movimientos.length) {
        cont.innerHTML = ''
        document.getElementById('detalle-persona-vacio').hidden = false
        return
      }
      document.getElementById('detalle-persona-vacio').hidden = true
      // OJO: no pasar renderizarFilaMovimiento directo a .map() — Array.map
      // manda (elemento, índice, array) y el índice pisaría el parámetro
      // { mostrarPersona } de la función.
      cont.innerHTML = estado.movimientos.map(m => renderizarFilaMovimiento(m)).join('')
    }

    // ═══════════════════════════════════════════════════════════════════════
    // VISTA — Retiros personales (exclusiva rol_app === 'super_admin')
    // ═══════════════════════════════════════════════════════════════════════

    async function abrirRetirosPersonales() {
      document.getElementById('vista-lista-caja').hidden = true
      document.getElementById('vista-retiros-personales').removeAttribute('hidden')

      document.getElementById('estado-cargando-retiros').hidden = false
      document.getElementById('lista-retiros-personales').innerHTML = ''
      document.getElementById('estado-vacio-retiros').hidden = true

      const { data, error } = await supabase
        .from('caja_movimientos')
        .select('id, tipo, monto, moneda, medio_pago, descripcion, fecha, empleado_id')
        .eq('tipo', 'egreso_retiro')
        .order('fecha', { ascending: false })
        .order('created_at', { ascending: false })

      document.getElementById('estado-cargando-retiros').hidden = true

      if (error) {
        mostrarError('No se pudieron cargar los retiros.')
        return
      }

      const retiros = data || []
      if (!retiros.length) {
        document.getElementById('estado-vacio-retiros').hidden = false
        return
      }
      document.getElementById('lista-retiros-personales').innerHTML =
        retiros.map(m => renderizarFilaMovimiento(m, { mostrarPersona: true })).join('')
    }

    function cerrarRetirosPersonales() {
      document.getElementById('vista-retiros-personales').hidden = true
      document.getElementById('vista-lista-caja').removeAttribute('hidden')
    }

    document.getElementById('btn-ver-retiros-personales').addEventListener('click', abrirRetirosPersonales)
    document.getElementById('btn-cerrar-retiros-personales').addEventListener('click', cerrarRetirosPersonales)
    document.getElementById('btn-mi-caja').addEventListener('click', () => abrirDetallePersona(estado.miEmpleado.id, 'listado'))

    // ═══════════════════════════════════════════════════════════════════════
    // MODAL — Registrar ingreso / retiro
    // ═══════════════════════════════════════════════════════════════════════

    function seleccionarMedioPagoCaja(valor) {
      medioPagoCajaSeleccionado = valor
      document.querySelectorAll('#grilla-medio-pago-caja .btn-tipo-doc').forEach(btn => {
        btn.classList.toggle('btn-tipo-doc--seleccionado', btn.dataset.valor === valor)
      })
    }

    document.querySelectorAll('#grilla-medio-pago-caja .btn-tipo-doc').forEach(btn => {
      btn.addEventListener('click', () => seleccionarMedioPagoCaja(btn.dataset.valor))
    })

    // tipo: 'ingreso' | 'retiro'. empleadoId: dueño de la ficha desde donde se
    // abrió (siempre presente — ya no existe el flujo de "elegir cualquier
    // empleado" desde el listado).
    function abrirModalMovimiento(tipo, empleadoId) {
      estado.wizardMovimiento = { tipo, empleadoId }

      const grupoContraparte  = document.getElementById('grupo-contraparte')
      const contraparteSelect = document.getElementById('contraparte-select')
      const contraparteFija   = document.getElementById('contraparte-fija')
      const avisoRetiro       = document.getElementById('aviso-retiro-personal')

      if (tipo === 'ingreso') {
        document.getElementById('movimiento-titulo').textContent = 'Añadir ingreso'
        avisoRetiro.hidden = true

        const persona = datosDePersona(empleadoId)
        const esRaiz = !!persona?.caja_raiz
        estado.wizardMovimiento.subtipo = esRaiz ? 'externo' : 'propio'

        if (esRaiz) {
          // Ingreso externo (solo lo carga el propio caja_raiz sobre su
          // ficha — ver el filtro en renderizarAccionesDetalle): no hay
          // contraparte, el dinero entra de afuera del sistema.
          grupoContraparte.style.display = 'none'
          estado.wizardMovimiento.contraparteFijaId = null
        } else {
          grupoContraparte.style.display = 'flex'
          if (persona?.rol_app === 'super_admin') {
            // Es un super_admin sin caja_raiz (Facundo): la contraparte es
            // fija, quien tiene caja_raiz — se busca en estado.superAdmins,
            // no se hardcodea el nombre.
            const raiz = estado.superAdmins.find(s => s.caja_raiz)
            contraparteFija.textContent = raiz?.nombre || '—'
            contraparteFija.hidden = false
            contraparteSelect.hidden = true
            estado.wizardMovimiento.contraparteFijaId = raiz?.id || null
          } else {
            // admin o usuario: selector con todos los super_admin (Pablo y
            // Facundo), sin filtrar por empresa.
            contraparteFija.hidden = true
            contraparteSelect.hidden = false
            contraparteSelect.innerHTML = '<option value="">— Seleccioná —</option>' +
              estado.superAdmins.map(s => `<option value="${s.id}">${s.nombre}</option>`).join('')
            estado.wizardMovimiento.contraparteFijaId = null
          }
        }
      } else {
        grupoContraparte.style.display = 'none'
        document.getElementById('movimiento-titulo').textContent = 'Registrar retiro'
        if (!esAdmin()) {
          avisoRetiro.textContent = 'Este retiro se descuenta de tu caja personal — no es un gasto de la empresa.'
          avisoRetiro.hidden = false
        } else {
          avisoRetiro.hidden = true
        }
      }

      document.getElementById('movimiento-monto').value = ''
      document.getElementById('movimiento-moneda').value = 'ARS'
      document.getElementById('movimiento-fecha').value = fechaISO(new Date())
      document.getElementById('movimiento-descripcion').value = ''
      seleccionarMedioPagoCaja(null)

      document.getElementById('modal-movimiento').hidden = false
    }

    function cerrarModalMovimiento() {
      document.getElementById('modal-movimiento').hidden = true
    }

    async function guardarMovimiento() {
      const { tipo, subtipo, empleadoId, contraparteFijaId } = estado.wizardMovimiento
      const monto       = parseImporte(document.getElementById('movimiento-monto').value)
      const moneda       = document.getElementById('movimiento-moneda').value
      const medioPago     = medioPagoCajaSeleccionado
      const fecha         = document.getElementById('movimiento-fecha').value || null
      const descripcion   = document.getElementById('movimiento-descripcion').value.trim() || null

      if (!monto || monto <= 0) { mostrarError('Ingresá un monto válido.'); return }
      if (!medioPago) { mostrarError('Elegí un medio de pago.'); return }

      let contraparteId = null
      if (tipo === 'ingreso' && subtipo === 'propio') {
        contraparteId = contraparteFijaId || document.getElementById('contraparte-select').value
        if (!contraparteId) { mostrarError('Elegí quién te dio la plata.'); return }
      }

      const btn = document.getElementById('btn-guardar-movimiento')
      btn.classList.add('btn--cargando')
      btn.disabled = true

      const esPropio = empleadoId === estado.miEmpleado.id

      try {
        let error
        if (tipo === 'ingreso' && subtipo === 'externo') {
          const params = { p_monto: monto, p_moneda: moneda, p_medio_pago: medioPago, p_descripcion: descripcion }
          if (fecha) params.p_fecha = fecha
          // ; a propósito: sin esto, ASI interpreta la línea de abajo como
          // una llamada — ver el comentario largo más abajo, mismo motivo.
          ;({ error } = await supabase.rpc('registrar_ingreso_externo_caja', params))
        } else if (tipo === 'ingreso') {
          const params = { p_monto: monto, p_moneda: moneda, p_medio_pago: medioPago, p_contraparte_empleado_id: contraparteId, p_descripcion: descripcion }
          if (fecha) params.p_fecha = fecha
          if (!esPropio) params.p_empleado_id = empleadoId
          ;({ error } = await supabase.rpc('registrar_ingreso_propio_caja', params))
        } else {
          const params = { p_monto: monto, p_moneda: moneda, p_medio_pago: medioPago, p_descripcion: descripcion }
          if (fecha) params.p_fecha = fecha
          if (!esPropio) params.p_empleado_id = empleadoId
          ;({ error } = await supabase.rpc('registrar_retiro_caja', params))
        }
        if (error) throw error

        mostrarExito(tipo === 'ingreso' ? 'Ingreso registrado.' : 'Retiro registrado.')
        cerrarModalMovimiento()

        if (estado.origenFicha === 'directo') {
          // Rol 'usuario': jamás se dispara la consulta de "todos los empleados".
          const [saldosRes, saldosMedioRes] = await Promise.all([
            supabase.from('v_caja_saldos').select('empleado_id, moneda, saldo').eq('empleado_id', estado.miEmpleado.id),
            supabase.from('v_caja_saldos_medio').select('empleado_id, moneda, medio_pago, saldo').eq('empleado_id', estado.miEmpleado.id),
          ])
          estado.saldos = saldosRes.data || []
          estado.saldosPorMedio = saldosMedioRes.data || []
          renderizarSaldosDetalle(estado.miEmpleado.id)
          await cargarMovimientos(estado.miEmpleado.id)
        } else {
          await cargarListado()
          if (estado.personaAbierta) {
            renderizarSaldosDetalle(estado.personaAbierta)
            await cargarMovimientos(estado.personaAbierta)
          }
        }
      } catch (err) {
        mostrarError(err.message || 'No se pudo registrar el movimiento.')
      } finally {
        btn.classList.remove('btn--cargando')
        btn.disabled = false
      }
    }

    document.getElementById('btn-cerrar-movimiento').addEventListener('click', cerrarModalMovimiento)
    document.getElementById('btn-cancelar-movimiento').addEventListener('click', cerrarModalMovimiento)
    document.getElementById('modal-movimiento__backdrop').addEventListener('click', cerrarModalMovimiento)
    document.getElementById('btn-guardar-movimiento').addEventListener('click', guardarMovimiento)

    document.getElementById('btn-retiro-personal-listado').addEventListener('click', () => abrirModalMovimiento('retiro', estado.miEmpleado.id))

    // ═══════════════════════════════════════════════════════════════════════
    // MODAL — Traspaso entre medios (efectivo ⇄ banco)
    // ═══════════════════════════════════════════════════════════════════════

    let direccionTraspasoSeleccionada = null

    function seleccionarDireccionTraspaso(valor) {
      direccionTraspasoSeleccionada = valor
      document.querySelectorAll('#grilla-direccion-traspaso .btn-tipo-doc').forEach(btn => {
        btn.classList.toggle('btn-tipo-doc--seleccionado', btn.dataset.valor === valor)
      })
    }

    document.querySelectorAll('#grilla-direccion-traspaso .btn-tipo-doc').forEach(btn => {
      btn.addEventListener('click', () => seleccionarDireccionTraspaso(btn.dataset.valor))
    })

    function abrirModalTraspaso() {
      document.getElementById('traspaso-monto').value = ''
      document.getElementById('traspaso-moneda').value = 'ARS'
      document.getElementById('traspaso-fecha').value = fechaISO(new Date())
      seleccionarDireccionTraspaso(null)
      document.getElementById('modal-traspaso').hidden = false
    }

    function cerrarModalTraspaso() {
      document.getElementById('modal-traspaso').hidden = true
    }

    async function guardarTraspaso() {
      const monto     = parseImporte(document.getElementById('traspaso-monto').value)
      const moneda     = document.getElementById('traspaso-moneda').value
      const direccion   = direccionTraspasoSeleccionada
      const fecha       = document.getElementById('traspaso-fecha').value || null

      if (!monto || monto <= 0) { mostrarError('Ingresá un monto válido.'); return }
      if (!direccion) { mostrarError('Elegí la dirección del traspaso.'); return }

      const btn = document.getElementById('btn-guardar-traspaso')
      btn.classList.add('btn--cargando')
      btn.disabled = true

      try {
        const params = { p_monto: monto, p_moneda: moneda, p_direccion: direccion }
        if (fecha) params.p_fecha = fecha
        const { error } = await supabase.rpc('registrar_traspaso_medio_caja', params)
        if (error) throw error

        mostrarExito('Traspaso registrado.')
        cerrarModalTraspaso()

        if (estado.origenFicha === 'directo') {
          // Rol 'usuario': jamás se dispara la consulta de "todos los empleados".
          const [saldosRes, saldosMedioRes] = await Promise.all([
            supabase.from('v_caja_saldos').select('empleado_id, moneda, saldo').eq('empleado_id', estado.miEmpleado.id),
            supabase.from('v_caja_saldos_medio').select('empleado_id, moneda, medio_pago, saldo').eq('empleado_id', estado.miEmpleado.id),
          ])
          estado.saldos = saldosRes.data || []
          estado.saldosPorMedio = saldosMedioRes.data || []
          renderizarSaldosDetalle(estado.miEmpleado.id)
          await cargarMovimientos(estado.miEmpleado.id)
        } else {
          await cargarListado()
          if (estado.personaAbierta) {
            renderizarSaldosDetalle(estado.personaAbierta)
            await cargarMovimientos(estado.personaAbierta)
          }
        }
      } catch (err) {
        mostrarError(err.message || 'No se pudo registrar el traspaso.')
      } finally {
        btn.classList.remove('btn--cargando')
        btn.disabled = false
      }
    }

    document.getElementById('btn-cerrar-traspaso').addEventListener('click', cerrarModalTraspaso)
    document.getElementById('btn-cancelar-traspaso').addEventListener('click', cerrarModalTraspaso)
    document.getElementById('modal-traspaso__backdrop').addEventListener('click', cerrarModalTraspaso)
    document.getElementById('btn-guardar-traspaso').addEventListener('click', guardarTraspaso)

    // ═══════════════════════════════════════════════════════════════════════
    // BÚSQUEDA Y FILTRO (listado general)
    // ═══════════════════════════════════════════════════════════════════════

    let debounceBusquedaCaja
    document.getElementById('filtro-busqueda-caja').addEventListener('input', (e) => {
      clearTimeout(debounceBusquedaCaja)
      const valor = e.target.value
      debounceBusquedaCaja = setTimeout(() => {
        estado.filtros.busqueda = valor
        renderizarListado()
      }, 250)
    })

    // ═══════════════════════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════════════════════

    async function init() {
      estado.sesion = await verificarSesion()
      if (!estado.sesion) return

      const { data: emp, error } = await supabase
        .from('empleados')
        .select('id, nombre, rol_app, caja_raiz')
        .eq('auth_user_id', estado.sesion.user.id)
        .maybeSingle()

      if (error || !emp) {
        mostrarError('No tenés permiso para acceder a este módulo.')
        setTimeout(() => window.location.replace('../dashboard.html'), 1500)
        return
      }

      estado.miEmpleado = emp

      // Comunes a todos los roles: hacen falta tanto en el listado (admin)
      // como en la ficha propia (usuario) para el modal de "Añadir ingreso".
      await Promise.all([cargarSuperAdmins(), cargarNombresEmpleados()])

      if (emp.rol_app === 'super_admin') {
        document.getElementById('btn-ver-retiros-personales').style.display = 'inline-flex'
        document.getElementById('btn-mi-caja').style.display = 'inline-flex'
      }

      if (esAdmin()) {
        document.getElementById('vista-lista-caja').removeAttribute('hidden')
        await cargarListado()
      } else {
        // Rol 'usuario': entra directo a su propia ficha, sin listado general
        // ni total de la empresa — nunca ve saldos ni datos de nadie más.
        await abrirDetallePersona(emp.id, 'directo')
      }
    }

    init()
  </script>

</body>
</html>

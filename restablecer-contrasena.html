<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elegir nueva contraseña — Seis Destinos</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a2a52">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    /* Ícono de mostrar/ocultar contraseña — mismo patrón que registro.html */
    .campo-contrasena { position: relative; }

    .campo-contrasena input { padding-right: 2.75rem; }

    .btn-mostrar-contrasena {
      position: absolute;
      right: 0.25rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      padding: 0.5rem;
      color: var(--color-texto-suave);
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .btn-mostrar-contrasena:hover { color: var(--color-texto); }

    .btn-mostrar-contrasena .lucide { width: 1.125rem; height: 1.125rem; }
  </style>
</head>
<body class="pagina-auth">

  <div class="tarjeta-auth">
    <div class="auth-logo">
      <img src="logo.png" alt="Seis Destinos" style="max-width: 200px; height: auto; display: block; margin: 0 auto;">
    </div>

    <div id="vista-verificando">
      <p style="font-size:0.9375rem; color:var(--color-texto-suave); text-align:center;">Verificando el link…</p>
    </div>

    <div id="vista-link-invalido" hidden>
      <p style="font-size:0.9375rem; color:var(--color-texto); text-align:center; margin-bottom:1.25rem;">
        Este link no es válido o ya expiró.
      </p>
      <a href="recuperar-contrasena.html" class="btn btn--primario" style="display:flex; justify-content:center;">Pedir un link nuevo</a>
    </div>

    <div id="vista-formulario" hidden>
      <p style="font-size:0.875rem; color:var(--color-texto-suave); margin: 0 0 1.25rem; text-align:center;">
        Elegí tu nueva contraseña.
      </p>

      <form class="formulario" id="formulario-restablecer" novalidate>
        <div class="grupo-campo">
          <label for="contrasena-nueva">Contraseña nueva</label>
          <div class="campo-contrasena">
            <input type="password" id="contrasena-nueva" name="contrasena-nueva" placeholder="••••••••" autocomplete="new-password" required>
            <button type="button" class="btn-mostrar-contrasena" data-target="contrasena-nueva" title="Mostrar contraseña">
              <i data-lucide="eye"></i>
            </button>
          </div>
        </div>

        <div class="grupo-campo">
          <label for="contrasena-confirmar">Confirmar contraseña</label>
          <div class="campo-contrasena">
            <input type="password" id="contrasena-confirmar" name="contrasena-confirmar" placeholder="••••••••" autocomplete="new-password" required>
            <button type="button" class="btn-mostrar-contrasena" data-target="contrasena-confirmar" title="Mostrar contraseña">
              <i data-lucide="eye"></i>
            </button>
          </div>
        </div>

        <div class="alerta alerta--error" id="alerta-error" role="alert"></div>

        <div class="formulario__acciones">
          <button type="submit" class="btn btn--primario" id="btn-guardar">Guardar contraseña</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { actualizarContrasena, marcarSesionRecuperacion, limpiarSesionRecuperacion } from './js/auth.js'
    import { supabase } from './js/supabase.js'
    import { mostrarBannerVersion } from './js/version-banner.js'

    mostrarBannerVersion()
    lucide.createIcons()

    function mostrarVista(id) {
      ;['vista-verificando', 'vista-link-invalido', 'vista-formulario'].forEach(v => {
        document.getElementById(v).hidden = v !== id
      })
    }

    // El link del mail trae el token de recuperación en la URL — el SDK lo
    // procesa solo (detectSessionInUrl) y establece una sesión de Auth REAL
    // para esa cuenta (no un ticket de un solo uso). marcarSesionRecuperacion()
    // deja una bandera que verificarSesion() revisa en cualquier otra página
    // — si esta pantalla se abandona sin completar el cambio, esa sesión no
    // puede colarse como un login válido en ningún lado (ver js/auth.js).
    let yaResuelto = false
    supabase.auth.onAuthStateChange((evento) => {
      if (evento === 'PASSWORD_RECOVERY') {
        yaResuelto = true
        marcarSesionRecuperacion()
        mostrarVista('vista-formulario')
      }
    })

    // Si a los 5 segundos no llegó el evento, el link es inválido/expirado
    // (o ya fue consumido por un click anterior a este mismo link). Puede
    // haber quedado una sesión REAL de ese click previo sin completar —
    // no alcanza con borrar la bandera, hay que cerrar la sesión de verdad
    // acá (capa extra además de verificarSesion(), por si alguna página
    // futura se olvida de llamarla antes de confiar en que hay sesión).
    setTimeout(() => {
      if (!yaResuelto) {
        supabase.auth.signOut().finally(() => {
          limpiarSesionRecuperacion()
          mostrarVista('vista-link-invalido')
        })
      }
    }, 5000)

    // Ícono de mostrar/ocultar contraseña — mismo patrón que registro.html
    document.querySelectorAll('.btn-mostrar-contrasena').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target)
        const estabaOculta = input.type === 'password'
        input.type = estabaOculta ? 'text' : 'password'
        btn.innerHTML = `<i data-lucide="${estabaOculta ? 'eye-off' : 'eye'}"></i>`
        lucide.createIcons()
      })
    })

    const formulario  = document.getElementById('formulario-restablecer')
    const btnGuardar   = document.getElementById('btn-guardar')
    const alertaError  = document.getElementById('alerta-error')

    function mostrarAlertaError(mensaje) {
      alertaError.textContent = mensaje
      alertaError.classList.add('alerta--visible')
    }

    formulario.addEventListener('submit', async (evento) => {
      evento.preventDefault()
      alertaError.classList.remove('alerta--visible')

      const nueva     = document.getElementById('contrasena-nueva').value
      const confirmar = document.getElementById('contrasena-confirmar').value

      if (!nueva || !confirmar) {
        mostrarAlertaError('Completá los dos campos.')
        return
      }
      if (nueva !== confirmar) {
        mostrarAlertaError('Las contraseñas no coinciden.')
        return
      }

      btnGuardar.classList.add('btn--cargando')
      btnGuardar.disabled = true

      try {
        await actualizarContrasena(nueva)
        // Recién acá la sesión de recuperación se "gradúa" a sesión normal
        // — el cambio de contraseña se completó, no hay nada más que
        // proteger, es seguro dejarla pasar como cualquier login.
        limpiarSesionRecuperacion()
        window.location.replace('dashboard.html')
      } catch (error) {
        mostrarAlertaError(error.message)
        btnGuardar.classList.remove('btn--cargando')
        btnGuardar.disabled = false
      }
    })
  </script>

</body>
</html>
